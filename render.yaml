# Render Blueprint — fully automates the deploy.
# https://render.com/docs/blueprint-spec
#
# Apply: Render dashboard → New → Blueprint → connect repo → Apply.
# Render will create the database, web service, and link them.

databases:
  - name: afrilabs-db
    plan: free
    databaseName: afrilabs
    user: afrilabs

services:
  - type: web
    name: afrilabs-ecosystem-intelligence
    runtime: node
    plan: free
    branch: main
    buildCommand: |
      npm install --legacy-peer-deps &&
      npx prisma generate &&
      npx prisma db push --accept-data-loss &&
      npx next build
    startCommand: npx next start -p $PORT
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20.18.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: afrilabs-db
          property: connectionString
      - key: NEXTAUTH_SECRET
        generateValue: true
      - key: AFRICONNECT_API_KEY
        generateValue: true
      # NEXTAUTH_URL is intentionally omitted on the first deploy.
      # next-auth auto-detects from request headers when unset, which works
      # fine on Render. Set it manually after first deploy if you want
      # explicit URL handling for OAuth providers (we only use credentials).
