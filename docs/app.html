function PartnershipForm({ initial, partners, programs, onSave, onCancel }) {
  const [f, setF] = useState(initial || {
    title:"", partnerId: partners[0]?.id ?? "", stage:"PROSPECT", value:"",
    source:"OUTBOUND", notes:"", programId:"",
    newPartnerName:"", newPartnerType:"CORPORATE",
  });
  const submit = (e) => { e.preventDefault(); onSave(f); };
  return (
    <form onSubmit={submit} className="p-6 space-y-4">
      <div><label className="label">Title *</label><input className="input" required value={f.title} onChange={e=>setF({...f,title:e.target.value})} placeholder="e.g. AAG 2026 Lead Sponsorship" /></div>
      <div className="grid gap-4 md:grid-cols-2">
        <div>
          <label className="label">Partner *</label>
          <select className="input" required={!f.newPartnerName} value={f.partnerId} onChange={e=>setF({...f,partnerId:e.target.value})}>
            <option value="">— Create new partner —</option>
            {partners.map(p=><option key={p.id} value={p.id}>{p.name} ({p.type})</option>)}
          </select>
        </div>
        <div><label className="label">Stage</label><select className="input" value={f.stage} onChange={e=>setF({...f,stage:e.target.value})}>{PARTNERSHIP_STAGES.map(s=><option key={s}>{s}</option>)}</select></div>
      </div>
      {!f.partnerId && (
        <div className="grid gap-4 md:grid-cols-2 rounded-md bg-gray-50 p-3">
          <div><label className="label">New partner name</label><input className="input" value={f.newPartnerName} onChange={e=>setF({...f,newPartnerName:e.target.value})} /></div>
          <div><label className="label">Type</label><select className="input" value={f.newPartnerType} onChange={e=>setF({...f,newPartnerType:e.target.value})}>{PARTNER_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        </div>
      )}
      <div className="grid gap-4 md:grid-cols-2">
        <div><label className="label">Estimated value (USD)</label><input type="number" min="0" step="1000" className="input" value={f.value} onChange={e=>setF({...f,value:e.target.value})} /></div>
        <div><label className="label">Link to program</label><select className="input" value={f.programId} onChange={e=>setF({...f,programId:e.target.value})}><option value="">— None —</option>{programs.map(p=><option key={p.id} value={p.id}>{p.code} · {p.name}</option>)}</select></div>
      </div>
      <div>
        <label className="label">Source</label>
        <select className="input" value={f.source} onChange={e=>setF({...f,source:e.target.value})}><option>OUTBOUND</option><option>INBOUND</option><option>REFERRAL</option><option>EVENT</option></select>
      </div>
      <div><label className="label">Notes</label><textarea className="input min-h-[100px]" value={f.notes} onChange={e=>setF({...f,notes:e.target.value})} /></div>
      <div className="flex justify-end gap-2 border-t border-gray-100 pt-4">
        <button type="button" onClick={onCancel} className="btn-ghost">Cancel</button>
        <button type="submit" className="btn-primary">Save partnership</button>
      </div>
    </form>
  );
}

function PartnershipsList({ data, update, search }) {
  const [filterStage, setFilterStage] = useState("");
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [newMessage, setNewMessage] = useState("");

  const partnerById = Object.fromEntries(data.partners.map(p=>[p.id,p]));
  const programById = Object.fromEntries(data.programs.map(p=>[p.id,p]));
  const userById = Object.fromEntries(data.users.map(u=>[u.id,u]));

  const filtered = data.partnerships.filter(p => {
    if (filterStage && p.stage !== filterStage) return false;
    if (search) {
      const s = search.toLowerCase();
      const partner = partnerById[p.partnerId];
      if (!(p.title + " " + (partner?.name||"")).toLowerCase().includes(s)) return false;
    }
    return true;
  }).sort((a,b)=>new Date(b.updatedAt) - new Date(a.updatedAt));

  const stageCounts = PARTNERSHIP_STAGES.reduce((acc, s) => ({...acc, [s]: data.partnerships.filter(p=>p.stage===s).length}), {});

  const save = (form) => {
    update(d => {
      let partnerId = form.partnerId;
      if (!partnerId && form.newPartnerName) {
        partnerId = uid();
        d.partners.push({ id: partnerId, name: form.newPartnerName, type: form.newPartnerType });
        logActivity(d, "PARTNER_CREATED", `Partner created: ${form.newPartnerName}`);
      }
      if (!partnerId) return d;

      if (editing) {
        const idx = d.partnerships.findIndex(p => p.id === editing.id);
        d.partnerships[idx] = { ...d.partnerships[idx], partnerId, title: form.title, stage: form.stage,
          value: form.value ? Number(form.value) : null, source: form.source, notes: form.notes,
          updatedAt: new Date().toISOString() };
        if (form.programId) {
          const exists = d.partnershipPrograms.some(pp => pp.partnershipId === editing.id && pp.programId === form.programId);
          if (!exists) d.partnershipPrograms.push({ id: uid(), partnershipId: editing.id, programId: form.programId, role:"DELIVERY_PARTNER" });
        }
        logActivity(d, "PARTNERSHIP_UPDATED", `Partnership updated: ${form.title}`, `Stage → ${form.stage}`, { partnershipId: editing.id });
        logAudit(d, "UPDATE", "Partnership", editing.id);
      } else {
        const id = uid();
        const now = new Date().toISOString();
        d.partnerships.push({ id, partnerId, ownerId: d.settings.currentUserId, title: form.title,
          stage: form.stage, value: form.value ? Number(form.value) : null, currency:"USD",
          source: form.source, notes: form.notes, createdAt: now, updatedAt: now });
        if (form.programId) d.partnershipPrograms.push({ id: uid(), partnershipId: id, programId: form.programId, role:"DELIVERY_PARTNER" });
        logActivity(d, "PARTNERSHIP_CREATED", `Partnership created: ${form.title}`, `Stage: ${form.stage}`, { partnershipId: id });
        logAudit(d, "CREATE", "Partnership", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const changeStage = (p, newStage) => {
    update(d => {
      const idx = d.partnerships.findIndex(x => x.id === p.id);
      d.partnerships[idx].stage = newStage;
      d.partnerships[idx].updatedAt = new Date().toISOString();
      logActivity(d, "PARTNERSHIP_UPDATED", `${partnerById[p.partnerId]?.name}: stage → ${newStage}`, null, { partnershipId: p.id });
      logAudit(d, "UPDATE", "Partnership", p.id);
      return d;
    });
    if (viewing?.id === p.id) setViewing({...p, stage: newStage});
  };
  const remove = (p) => {
    if (!confirm("Delete this partnership permanently?")) return;
    update(d => {
      d.partnerships = d.partnerships.filter(x => x.id !== p.id);
      d.partnershipPrograms = d.partnershipPrograms.filter(pp => pp.partnershipId !== p.id);
      logAudit(d, "DELETE", "Partnership", p.id);
      return d;
    });
    setViewing(null);
  };
  const sendMessage = () => {
    if (!newMessage.trim() || !viewing) return;
    update(d => {
      logActivity(d, "PARTNERSHIP_NOTE", `Note on ${partnerById[viewing.partnerId]?.name}`, newMessage.trim(), { partnershipId: viewing.id });
      return d;
    });
    setNewMessage("");
  };

  return (
    <div>
      <PageHeader title="Partnerships" subtitle="Pipeline of investors, donors, corporates and government partners."
        action={<button className="btn-primary" onClick={()=>setCreating(true)}>+ New partnership</button>} />

      <div className="mb-5 flex flex-wrap gap-2">
        <button onClick={()=>setFilterStage("")} className={cls("rounded-md border px-2 py-1 text-xs", !filterStage ? "border-brand-300 bg-brand-50 text-brand-700" : "border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100")}>All ({data.partnerships.length})</button>
        {PARTNERSHIP_STAGES.map(s => (
          <button key={s} onClick={()=>setFilterStage(s)} className={cls("rounded-md border px-2 py-1 text-xs", filterStage===s ? "border-brand-300 bg-brand-50 text-brand-700" : "border-gray-200 bg-gray-50 text-gray-700 hover:bg-gray-100")}>
            {s.replace(/_/g," ")} ({stageCounts[s]})
          </button>
        ))}
      </div>

      <div className="card">
        <table className="table-base">
          <thead><tr><th>Partner</th><th>Title</th><th>Stage</th><th>Value</th><th>Programs</th><th>Owner</th><th>Updated</th><th></th></tr></thead>
          <tbody>
            {filtered.map(p => {
              const partner = partnerById[p.partnerId];
              const linked = data.partnershipPrograms.filter(pp => pp.partnershipId === p.id).map(pp=>programById[pp.programId]?.code).filter(Boolean);
              return (
                <tr key={p.id}>
                  <td><div className="font-medium">{partner?.name ?? "—"}</div><div className="text-xs text-gray-500">{partner?.type} · {partner?.country ?? "—"}</div></td>
                  <td>{p.title}</td>
                  <td>
                    <select value={p.stage} onChange={e=>changeStage(p, e.target.value)}
                            className={cls("stage-select uppercase", STAGE_TONES[p.stage]==="green"&&"text-brand-700",STAGE_TONES[p.stage]==="orange"&&"text-accent-700",STAGE_TONES[p.stage]==="blue"&&"text-blue-700",STAGE_TONES[p.stage]==="yellow"&&"text-yellow-800",STAGE_TONES[p.stage]==="red"&&"text-red-700",STAGE_TONES[p.stage]==="gray"&&"text-gray-700")}>
                      {PARTNERSHIP_STAGES.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </td>
                  <td className="num">{p.value ? fmtCurrency(p.value, p.currency) : <span className="text-gray-400">—</span>}</td>
                  <td className="text-[11px]">{linked.length ? <span className="font-mono">{linked.join(", ")}</span> : <span className="text-gray-400">—</span>}</td>
                  <td className="text-[12px] text-gray-600 dark:text-gray-400">{userById[p.ownerId]?.name ?? "—"}</td>
                  <td className="text-[11px] text-gray-500">{relTime(p.updatedAt)}</td>
                  <td className="text-right"><button onClick={()=>setViewing(p)} className="action-icon" title="Open"><Icon.eye className="h-3.5 w-3.5"/></button></td>
                </tr>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan="8" className="py-10 text-center text-gray-500">No partnerships match.</td></tr>}
          </tbody>
        </table>
      </div>

      <Modal open={creating || !!editing || !!viewing} onClose={()=>{setCreating(false); setEditing(null); setViewing(null);}}
             title={creating ? "New partnership" : editing ? "Edit partnership" : viewing?.title ?? ""} size="lg">
        {(creating || editing) ? (
          <PartnershipForm initial={editing} partners={data.partners} programs={data.programs} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} />
        ) : viewing ? (
          <div className="p-6">
            <div className="grid gap-3 md:grid-cols-4 mb-6 text-sm">
              <div><p className="text-xs uppercase text-gray-500">Partner</p><p className="font-medium">{partnerById[viewing.partnerId]?.name}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Stage</p><p><StageBadge stage={viewing.stage}/></p></div>
              <div><p className="text-xs uppercase text-gray-500">Value</p><p className="font-medium">{viewing.value ? fmtCurrency(viewing.value) : "—"}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Owner</p><p className="font-medium">{userById[viewing.ownerId]?.name ?? "—"}</p></div>
            </div>
            <div className="mb-6"><p className="text-xs uppercase text-gray-500 mb-1">Notes</p><p className="whitespace-pre-wrap rounded-md bg-gray-50 p-3 text-sm">{viewing.notes || <span className="text-gray-400">No notes yet.</span>}</p></div>

            <div className="mb-6">
              <h4 className="mb-2 text-sm font-semibold uppercase text-gray-500">Linked programs</h4>
              <ul className="space-y-1 text-sm">
                {data.partnershipPrograms.filter(pp => pp.partnershipId === viewing.id).map(pp => {
                  const prog = programById[pp.programId];
                  return prog && <li key={pp.id} className="flex items-center justify-between rounded-md bg-gray-50 px-3 py-2"><span><span className="font-mono text-xs text-gray-500">{prog.code}</span> {prog.name}</span><span className="text-xs text-gray-500">{pp.role}</span></li>;
                })}
                {data.partnershipPrograms.filter(pp => pp.partnershipId === viewing.id).length === 0 && <li className="text-xs text-gray-400">No programs linked.</li>}
              </ul>
            </div>

            <div className="mb-6">
              <h4 className="mb-2 text-sm font-semibold uppercase text-gray-500">Internal thread</h4>
              <div className="flex gap-2 mb-3">
                <textarea value={newMessage} onChange={e=>setNewMessage(e.target.value)} className="input flex-1 min-h-[60px]" placeholder="Drop an update for the team…" />
                <button onClick={sendMessage} className="btn-primary self-start">Post</button>
              </div>
              <div className="space-y-2 max-h-48 overflow-y-auto">
                {data.activities.filter(a => a.partnershipId === viewing.id).slice(0,15).map(a => (
                  <div key={a.id} className="rounded-md border border-gray-100 bg-gray-50 p-3 text-sm">
                    <p className="text-gray-800">{a.body || a.title}</p>
                    <p className="mt-1 text-xs text-gray-500">{userById[a.userId]?.name ?? "system"} · {relTime(a.createdAt)}</p>
                  </div>
                ))}
              </div>
            </div>

            <div className="flex justify-between border-t border-gray-100 pt-4">
              <button onClick={()=>remove(viewing)} className="btn-danger">Delete</button>
              <div className="space-x-2"><button onClick={()=>setViewing(null)} className="btn-ghost">Close</button><button onClick={()=>{setEditing(viewing); setViewing(null);}} className="btn-outline">Edit</button></div>
            </div>
          </div>
        ) : null}
      </Modal>
    </div>
  );
}

function ProgramForm({ initial, users, onSave, onCancel }) {
  const [f, setF] = useState(initial || { name:"", code:"", type:"INITIATIVE", status:"DRAFT", description:"", region:"", budget:"", leadId: users[0]?.id ?? "" });
  const submit = (e) => { e.preventDefault(); onSave({...f, code: f.code.toUpperCase()}); };
  return (
    <form onSubmit={submit} className="p-6 space-y-4">
      <div className="grid gap-4 md:grid-cols-2">
        <div><label className="label">Name *</label><input className="input" required value={f.name} onChange={e=>setF({...f,name:e.target.value})} /></div>
        <div><label className="label">Code *</label><input className="input" required value={f.code} onChange={e=>setF({...f,code:e.target.value})} placeholder="e.g. CATALYTIC" /></div>
        <div><label className="label">Type</label><select className="input" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>{PROGRAM_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label className="label">Status</label><select className="input" value={f.status} onChange={e=>setF({...f,status:e.target.value})}>{PROGRAM_STATUS.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label className="label">Region</label><select className="input" value={f.region} onChange={e=>setF({...f,region:e.target.value})}><option value="">Pan-African</option>{REGIONS.map(r=><option key={r}>{r}</option>)}</select></div>
        <div><label className="label">Budget (USD)</label><input type="number" min="0" step="1000" className="input" value={f.budget} onChange={e=>setF({...f,budget:e.target.value})} /></div>
        <div className="md:col-span-2"><label className="label">Lead</label><select className="input" value={f.leadId} onChange={e=>setF({...f,leadId:e.target.value})}>{users.map(u=><option key={u.id} value={u.id}>{u.name}</option>)}</select></div>
      </div>
      <div><label className="label">Description</label><textarea className="input min-h-[100px]" value={f.description} onChange={e=>setF({...f,description:e.target.value})} /></div>
      <div className="flex justify-end gap-2 border-t border-gray-100 pt-4">
        <button type="button" onClick={onCancel} className="btn-ghost">Cancel</button>
        <button type="submit" className="btn-primary">Save program</button>
      </div>
    </form>
  );
}

function ProgramsList({ data, update, search }) {
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);

  const filtered = data.programs.filter(p => !search || (p.name+p.code+p.description).toLowerCase().includes(search.toLowerCase()));
  const partnerById = Object.fromEntries(data.partners.map(p=>[p.id,p]));
  const userById = Object.fromEntries(data.users.map(u=>[u.id,u]));
  const hubById = Object.fromEntries(data.hubs.map(h=>[h.id,h]));

  const save = (form) => {
    update(d => {
      const payload = { ...form, budget: form.budget ? Number(form.budget) : null, region: form.region || null };
      if (editing) {
        const idx = d.programs.findIndex(p => p.id === editing.id);
        d.programs[idx] = { ...d.programs[idx], ...payload };
        logActivity(d, "PROGRAM_UPDATED", `Program updated: ${form.name}`, null, { programId: editing.id });
        logAudit(d, "UPDATE", "Program", editing.id);
      } else {
        const id = uid();
        d.programs.push({ id, ...payload });
        logActivity(d, "PROGRAM_LAUNCHED", `Program created: ${form.name}`, `Code: ${payload.code}`, { programId: id });
        logAudit(d, "CREATE", "Program", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const remove = (p) => {
    if (!confirm("Delete this program permanently?")) return;
    update(d => {
      d.programs = d.programs.filter(x => x.id !== p.id);
      d.partnershipPrograms = d.partnershipPrograms.filter(pp => pp.programId !== p.id);
      d.programHubs = d.programHubs.filter(ph => ph.programId !== p.id);
      logAudit(d, "DELETE", "Program", p.id);
      return d;
    });
    setViewing(null);
  };

  // Charts
  const statusBreakdown = PROGRAM_STATUS.map((s,i)=>({label:s, value: data.programs.filter(p=>p.status===s).length, color:["#94a3b8","#3d9462","#eab308","#a855f7"][i]})).filter(d=>d.value>0);
  const typeBreakdown = PROGRAM_TYPES.map((t,i)=>({label:t.replace("_"," "), value: data.programs.filter(p=>p.type===t).length, color:["#3b82f6","#fb7d12","#a855f7","#3d9462"][i]})).filter(d=>d.value>0);
  const fundingPerProgram = data.programs.map(p => ({
    label: p.code,
    value: data.fundingSources.filter(f => f.programId === p.id).reduce((s,f) => s+f.amount, 0),
  })).filter(d => d.value > 0).sort((a,b) => b.value - a.value).slice(0, 6);

  return (
    <div>
      <PageHeader title="Programs" subtitle="Accelerators, initiatives, research and ecosystem projects."
        action={<button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> New program</button>} />

      <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-4">
        <StatCard icon={Icon.programs} label="Total programs" value={data.programs.length} accent="green" />
        <StatCard icon={Icon.trending} label="Active" value={data.programs.filter(p=>p.status==="ACTIVE").length} accent="green" trend={5} />
        <StatCard icon={Icon.funding}  label="Total budget" value={fmtCurrency(data.programs.reduce((s,p)=>s+(p.budget||0), 0))} accent="blue" />
        <StatCard icon={Icon.layers}   label="Programs with funding" value={data.programs.filter(p => data.fundingSources.some(f => f.programId === p.id)).length} accent="purple" />
      </div>

      <div className="mt-5 grid gap-4 lg:grid-cols-3">
        <div className="card animate-fade-up">
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Status</h3></div>
          <div className="p-4"><DonutChart data={statusBreakdown} size={160} thickness={20}/></div>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.05s"}}>
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">By type</h3></div>
          <div className="p-4"><DonutChart data={typeBreakdown} size={160} thickness={20}/></div>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Funding per program</h3><p className="text-[11px] text-gray-500">Top 6 by total funding</p></div>
          <div className="p-4 text-gray-700 dark:text-gray-300"><BarChart data={fundingPerProgram.map(d=>({label:d.label, value: Math.round(d.value/1000)}))} height={180}/></div>
        </div>
      </div>

      <h3 className="mt-6 mb-3 text-[14px] font-bold">All programs</h3>
      <div className="grid gap-3 md:grid-cols-2 xl:grid-cols-3">
        {filtered.map(p => {
          const partners = data.partnershipPrograms.filter(pp => pp.programId === p.id).length;
          const hubs = data.programHubs.filter(ph => ph.programId === p.id).length;
          const funding = data.fundingSources.filter(f => f.programId === p.id).reduce((s,f)=>s+f.amount, 0);
          return (
            <div key={p.id} onClick={()=>setViewing(p)} className="cursor-pointer rounded-xl border border-gray-200 bg-white p-5 shadow-sm transition hover:shadow-md">
              <div className="mb-2 flex items-start justify-between gap-2"><span className="font-mono text-xs text-gray-500">{p.code}</span><StageBadge stage={p.status}/></div>
              <h3 className="text-base font-semibold">{p.name}</h3>
              <p className="mt-1 line-clamp-2 text-sm text-gray-500">{p.description ?? "—"}</p>
              <div className="mt-4 grid grid-cols-3 gap-2 text-center">
                <div><div className="text-lg font-bold">{partners}</div><div className="text-[10px] uppercase text-gray-500">Partners</div></div>
                <div><div className="text-lg font-bold">{hubs}</div><div className="text-[10px] uppercase text-gray-500">Hubs</div></div>
                <div><div className="text-lg font-bold">{fmtNum(funding)}</div><div className="text-[10px] uppercase text-gray-500">Funding</div></div>
              </div>
              <div className="mt-3 flex items-center justify-between text-xs text-gray-500"><span>{p.region ?? "Pan-African"}</span><span>{p.budget ? fmtCurrency(p.budget) : "—"}</span></div>
              <div className="mt-2 flex items-center justify-between text-xs text-gray-400"><span>Lead: {userById[p.leadId]?.name ?? "Unassigned"}</span></div>
            </div>
          );
        })}
        {filtered.length === 0 && <div className="col-span-full"><Empty title="No programs yet" hint="Create your first one." action={<button onClick={()=>setCreating(true)} className="btn-primary">+ New program</button>} /></div>}
      </div>

      <Modal open={creating || !!editing || !!viewing} onClose={()=>{setCreating(false); setEditing(null); setViewing(null);}}
             title={creating ? "New program" : editing ? "Edit program" : viewing?.name} size="lg">
        {(creating || editing) ? (
          <ProgramForm initial={editing} users={data.users} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} />
        ) : viewing ? (
          <div className="p-6">
            <div className="grid gap-3 md:grid-cols-4 mb-6 text-sm">
              <div><p className="text-xs uppercase text-gray-500">Code</p><p className="font-mono">{viewing.code}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Type</p><p>{viewing.type}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Status</p><p><StageBadge stage={viewing.status}/></p></div>
              <div><p className="text-xs uppercase text-gray-500">Region</p><p>{viewing.region ?? "Pan-African"}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Budget</p><p>{viewing.budget ? fmtCurrency(viewing.budget) : "—"}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Lead</p><p>{userById[viewing.leadId]?.name ?? "—"}</p></div>
            </div>
            {viewing.description && <div className="mb-6"><p className="text-xs uppercase text-gray-500 mb-1">Description</p><p className="text-sm">{viewing.description}</p></div>}

            <div className="grid gap-4 md:grid-cols-2 mb-6">
              <div>
                <h4 className="mb-2 text-sm font-semibold uppercase text-gray-500">Partnerships ({data.partnershipPrograms.filter(pp=>pp.programId===viewing.id).length})</h4>
                <ul className="space-y-1 text-sm">
                  {data.partnershipPrograms.filter(pp=>pp.programId===viewing.id).map(pp => {
                    const ps = data.partnerships.find(x=>x.id===pp.partnershipId); if (!ps) return null;
                    return <li key={pp.id} className="rounded-md bg-gray-50 px-3 py-2">{partnerById[ps.partnerId]?.name} <StageBadge stage={ps.stage}/></li>;
                  })}
                </ul>
              </div>
              <div>
                <h4 className="mb-2 text-sm font-semibold uppercase text-gray-500">Funding ({fmtCurrency(data.fundingSources.filter(f=>f.programId===viewing.id).reduce((s,f)=>s+f.amount,0))})</h4>
                <ul className="space-y-1 text-sm">
                  {data.fundingSources.filter(f=>f.programId===viewing.id).map(f => (
                    <li key={f.id} className="rounded-md bg-gray-50 px-3 py-2 flex justify-between"><span>{f.name}</span><span><StageBadge stage={f.status}/> {fmtCurrency(f.amount)}</span></li>
                  ))}
                </ul>
              </div>
            </div>

            <div className="flex justify-between border-t border-gray-100 pt-4">
              <button onClick={()=>remove(viewing)} className="btn-danger">Delete</button>
              <div className="space-x-2"><button onClick={()=>setViewing(null)} className="btn-ghost">Close</button><button onClick={()=>{setEditing(viewing); setViewing(null);}} className="btn-outline">Edit</button></div>
            </div>
          </div>
        ) : null}
      </Modal>
    </div>
  );
}

        <div><label className="label">Type</label><select className="input" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>{FUNDING_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label className="label">Status</label><select className="input" value={f.status} onChange={e=>setF({...f,status:e.target.value})}>{FUNDING_STATUS.map(t=><option key={t}>{t}</option>)}</select></div>

        <div className="md:col-span-2"><label className="label">Program</label><select className="input" value={f.programId} onChange={e=>setF({...f,programId:e.target.value})}><option value="">—</option>{programs.map(p=><option key={p.id} value={p.id}>{p.code} · {p.name}</option>)}</select></div>

      <div className="flex justify-end gap-2 border-t border-gray-100 pt-4">

function FundingList({ data, update }) {
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);

  const partnerById = Object.fromEntries(data.partners.map(p=>[p.id,p]));
  const programById = Object.fromEntries(data.programs.map(p=>[p.id,p]));
  const total = data.fundingSources.reduce((s,f)=>s+f.amount, 0);
  const totals = FUNDING_STATUS.reduce((acc, s) => ({...acc, [s]: data.fundingSources.filter(f=>f.status===s).reduce((sum,f)=>sum+f.amount, 0)}), {});

  const byRegion = {};
  data.fundingSources.forEach(f => {
    const r = programById[f.programId]?.region ?? "Pan-African";
    byRegion[r] = (byRegion[r] || 0) + f.amount;
  });

  const save = (form) => {
    update(d => {
      const payload = { ...form, amount: Number(form.amount), partnerId: form.partnerId || null, programId: form.programId || null, currency:"USD" };
      if (editing) {
        const idx = d.fundingSources.findIndex(x => x.id === editing.id);
        d.fundingSources[idx] = { ...d.fundingSources[idx], ...payload };
        logAudit(d, "UPDATE", "FundingSource", editing.id);
      } else {
        const id = uid();
        d.fundingSources.push({ id, ...payload, pledgeDate: new Date().toISOString() });
        logActivity(d, "FUNDING_PLEDGED", `${payload.type} pledged: ${form.name}`, fmtCurrency(payload.amount), { programId: form.programId || null });
        logAudit(d, "CREATE", "FundingSource", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const remove = (f) => {
    if (!confirm("Delete this funding record?")) return;
    update(d => {
      d.fundingSources = d.fundingSources.filter(x => x.id !== f.id);
      logAudit(d, "DELETE", "FundingSource", f.id);
      return d;
    });
  };

  return (
    <div>
      <PageHeader title="Funding & Grants" subtitle="Investments, grants and sponsorships across the ecosystem."
        action={<button className="btn-primary" onClick={()=>setCreating(true)}>+ Add funding</button>} />

      <div className="grid gap-4 md:grid-cols-4">
        <StatCard icon={Icon.bookmark} label="Pledged"   value={fmtCurrency(totals.PLEDGED || 0)} accent="orange" />
        <StatCard icon={Icon.check}    label="Approved"  value={fmtCurrency(totals.APPROVED || 0)} accent="blue" />
        <StatCard icon={Icon.send}     label="Disbursed" value={fmtCurrency(totals.DISBURSED || 0)} accent="green" />
        <StatCard icon={Icon.funding}  label="Total"     value={fmtCurrency(total)} hint={`${data.fundingSources.length} sources`} accent="purple" />
      </div>

      <div className="mt-6 grid gap-6 lg:grid-cols-3">
        <div className="card animate-fade-up">
          <div className="border-b border-gray-100 px-5 py-4 dark:border-white/5"><h3 className="text-base font-bold">Status breakdown</h3><p className="text-sm text-gray-500 dark:text-gray-400">Pipeline distribution</p></div>
          <div className="p-5"><DonutChart data={FUNDING_STATUS.map((s,i)=>({label:s, value: totals[s] || 0, color:["#eab308","#3b82f6","#3d9462","#a855f7"][i]})).filter(d=>d.value>0)} size={170} thickness={22} /></div>
        </div>
        <div className="card lg:col-span-2 animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="border-b border-gray-100 px-5 py-4 dark:border-white/5"><h3 className="text-base font-semibold">Funding ledger</h3></div>
          <table className="table-base">
            <thead><tr><th>Source</th><th>Type</th><th>Partner</th><th>Program</th><th>Amount</th><th>Status</th><th></th></tr></thead>
            <tbody>
              {data.fundingSources.map(f => (
                <tr key={f.id}>
                  <td><div className="font-semibold text-[13px]">{f.name}</div></td>
                  <td><Badge tone={f.type==="GRANT"?"green":f.type==="INVESTMENT"?"blue":"orange"}>{f.type}</Badge></td>
                  <td className="text-[12px] text-gray-600 dark:text-gray-400">{partnerById[f.partnerId]?.name ?? "—"}</td>
                  <td><span className="font-mono text-[11px] text-gray-600 dark:text-gray-400">{programById[f.programId]?.code ?? "—"}</span></td>
                  <td className="num">{fmtCurrency(f.amount)}</td>
                  <td><StageBadge stage={f.status}/></td>
                  <td>
                    <div className="flex justify-end gap-1">
                      <button onClick={()=>setEditing(f)} title="Edit" className="action-icon"><Icon.edit className="h-3.5 w-3.5"/></button>
                      <button onClick={()=>remove(f)} title="Delete" className="action-icon action-icon-danger"><Icon.trash className="h-3.5 w-3.5"/></button>
                    </div>
                  </td>
                </tr>
              ))}
              {data.fundingSources.length === 0 && <tr><td colSpan="7" className="py-8 text-center text-[13px] text-gray-500">No funding records yet.</td></tr>}
            </tbody>
          </table>
        </div>

        <div className="card">
          <div className="border-b border-gray-100 px-5 py-4 dark:border-white/5"><h3 className="text-base font-semibold">Funding by region</h3></div>
          <div className="space-y-3 p-5">
            {Object.entries(byRegion).sort((a,b)=>b[1]-a[1]).map(([r, v]) => {
              const pct = total > 0 ? (v/total)*100 : 0;
              return (
                <div key={r}>
                  <div className="mb-1 flex justify-between text-sm"><span className="font-medium">{r}</span><span className="text-gray-500">{fmtCurrency(v)} ({pct.toFixed(0)}%)</span></div>
                  <div className="h-2 rounded-full bg-gray-100"><div className="h-2 rounded-full bg-brand-500" style={{width:`${pct}%`}}/></div>
                </div>
              );
            })}
            {Object.keys(byRegion).length === 0 && <p className="text-sm text-gray-500">No regional data yet.</p>}
          </div>
        </div>
      </div>

      <Modal open={creating || !!editing} onClose={()=>{setCreating(false); setEditing(null);}} title={creating ? "Add funding" : "Edit funding"} size="lg">
        <FundingForm initial={editing} partners={data.partners} programs={data.programs} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} />
      </Modal>
    </div>
  );
}

function EventForm({ initial, programs, onSave, onCancel }) {
  const [f, setF] = useState(initial || {
    name:"", type:"PROGRAM_EVENT", status:"PLANNING",
    startDate:new Date().toISOString().slice(0,10), location:"", city:"", country:"",
    capacity:"", registered:0, attended:0, programId:"", description:"",
  });
  const submit = (e) => { e.preventDefault(); onSave({ ...f, programId: f.programId || null,
    capacity: f.capacity ? Number(f.capacity) : null, registered: Number(f.registered)||0, attended: Number(f.attended)||0,
    startDate: new Date(f.startDate).toISOString() }); };
  return (
    <form onSubmit={submit} className="p-6 space-y-4">
      <div><label className="label">Name *</label><input className="input" required value={f.name} onChange={e=>setF({...f,name:e.target.value})} /></div>
      <div className="grid gap-4 md:grid-cols-3">
        <div><label className="label">Type</label><select className="input" value={f.type} onChange={e=>setF({...f,type:e.target.value})}>{EVENT_TYPES.map(t=><option key={t}>{t}</option>)}</select></div>
        <div><label className="label">Status</label><select className="input" value={f.status} onChange={e=>setF({...f,status:e.target.value})}>{EVENT_STATUS.map(s=><option key={s}>{s}</option>)}</select></div>
        <div><label className="label">Start *</label><input type="date" required className="input" value={typeof f.startDate==='string' ? f.startDate.slice(0,10) : ""} onChange={e=>setF({...f,startDate:e.target.value})} /></div>
      </div>
      <div className="grid gap-4 md:grid-cols-3">
        <div><label className="label">Location</label><input className="input" value={f.location??""} onChange={e=>setF({...f,location:e.target.value})} /></div>
        <div><label className="label">City</label><input className="input" value={f.city??""} onChange={e=>setF({...f,city:e.target.value})} /></div>
        <div><label className="label">Country</label><input className="input" value={f.country??""} onChange={e=>setF({...f,country:e.target.value})} /></div>
      </div>
      <div className="grid gap-4 md:grid-cols-3">
        <div><label className="label">Capacity</label><input type="number" className="input" value={f.capacity??""} onChange={e=>setF({...f,capacity:e.target.value})} /></div>
        <div><label className="label">Registered</label><input type="number" className="input" value={f.registered} onChange={e=>setF({...f,registered:e.target.value})} /></div>
        <div><label className="label">Attended</label><input type="number" className="input" value={f.attended} onChange={e=>setF({...f,attended:e.target.value})} /></div>
      </div>
      <div><label className="label">Program</label><select className="input" value={f.programId??""} onChange={e=>setF({...f,programId:e.target.value})}><option value="">—</option>{programs.map(p=><option key={p.id} value={p.id}>{p.code} · {p.name}</option>)}</select></div>
      <div><label className="label">Description</label><textarea className="input min-h-[80px]" value={f.description??""} onChange={e=>setF({...f,description:e.target.value})} /></div>
      <div className="flex justify-end gap-2 border-t border-gray-100 pt-4">
        <button type="button" onClick={onCancel} className="btn-ghost">Cancel</button>
        <button type="submit" className="btn-primary">Save event</button>
      </div>
    </form>
  );
}

function EventsList({ data, update }) {
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [taskTitle, setTaskTitle] = useState("");
  const [taskDept, setTaskDept] = useState("EVENTS");

  const programById = Object.fromEntries(data.programs.map(p=>[p.id,p]));
  const counts = EVENT_STATUS.reduce((acc, s) => ({...acc, [s]: data.events.filter(e=>e.status===s).length}), {});

  const save = (form) => {
    update(d => {
      if (editing) {
        const idx = d.events.findIndex(e => e.id === editing.id);
        d.events[idx] = { ...d.events[idx], ...form };
        logActivity(d, "EVENT_UPDATED", `Event updated: ${form.name}`, null, { eventId: editing.id });
        logAudit(d, "UPDATE", "Event", editing.id);
      } else {
        const id = uid();
        d.events.push({ id, ...form });
        logActivity(d, "EVENT_CREATED", `Event created: ${form.name}`, `Status: ${form.status}`, { eventId: id });
        logAudit(d, "CREATE", "Event", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const moveStatus = (e, newStatus) => {
    update(d => {
      const idx = d.events.findIndex(x => x.id === e.id);
      d.events[idx].status = newStatus;
      logActivity(d, "EVENT_UPDATED", `${e.name}: status → ${newStatus}`, null, { eventId: e.id });
      logAudit(d, "UPDATE", "Event", e.id);
      return d;
    });
    if (viewing?.id === e.id) setViewing({...e, status: newStatus});
  };
  const addTask = () => {
    if (!taskTitle.trim() || !viewing) return;
    update(d => {
      const id = uid();
      d.tasks.push({ id, title: taskTitle.trim(), eventId: viewing.id, department: taskDept, priority:"MEDIUM", status:"TODO", createdAt: new Date().toISOString() });
      logAudit(d, "CREATE", "Task", id);
      return d;
    });
    setTaskTitle("");
  };
  const toggleTask = (t) => {
    update(d => {
      const idx = d.tasks.findIndex(x => x.id === t.id);
      const next = d.tasks[idx].status === "DONE" ? "TODO" : "DONE";
      d.tasks[idx].status = next;
      d.tasks[idx].completedAt = next === "DONE" ? new Date().toISOString() : null;
      return d;
    });
  };
  const remove = (e) => {
    if (!confirm("Delete this event permanently?")) return;
    update(d => {
      d.events = d.events.filter(x => x.id !== e.id);
      d.tasks = d.tasks.filter(t => t.eventId !== e.id);
      d.eventPartners = d.eventPartners.filter(ep => ep.eventId !== e.id);
      logAudit(d, "DELETE", "Event", e.id);
      return d;
    });
    setViewing(null);
  };

  const lifecycleData = EVENT_STATUS.map((s,i)=>({label:s.replace("_"," "), value: counts[s], color:["#94a3b8","#3b82f6","#fb7d12","#a855f7","#3d9462"][i]})).filter(d=>d.value>0);
  const taskByDept = DEPARTMENTS.map(d => ({label: d.code, value: data.tasks.filter(t=>t.department===d.code).length})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value).slice(0,6);
  const totalRegistered = data.events.reduce((s,e)=>s+(e.registered||0), 0);
  const totalAttended = data.events.reduce((s,e)=>s+(e.attended||0), 0);
  const attRate = totalRegistered ? Math.round((totalAttended/totalRegistered)*100) : 0;

  return (
    <div>
      <PageHeader title="Events & Activation" subtitle="AAG and program events from planning through post-event analysis."
        action={<button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> New event</button>} />

      <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-4">
        <StatCard icon={Icon.events} label="Total events" value={data.events.length} accent="green" />
        <StatCard icon={Icon.people} label="Registered" value={totalRegistered} accent="blue" trend={8} />
        <StatCard icon={Icon.check}  label="Attended" value={totalAttended} hint={`${attRate}% attendance`} accent="orange" />
        <StatCard icon={Icon.tasks}  label="Open tasks" value={data.tasks.filter(t=>t.status!=="DONE").length} accent="purple" />
      </div>

      <div className="mt-5 grid gap-4 lg:grid-cols-3">
        <div className="card animate-fade-up">
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Event lifecycle</h3></div>
          <div className="p-4"><DonutChart data={lifecycleData} size={160} thickness={20}/></div>
        </div>
        <div className="card lg:col-span-2 animate-fade-up" style={{animationDelay:"0.05s"}}>
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Tasks by department</h3><p className="text-[11px] text-gray-500">Where the work is</p></div>
          <div className="p-4 text-gray-700 dark:text-gray-300">{taskByDept.length ? <BarChart data={taskByDept} height={180}/> : <p className="py-8 text-center text-[12px] text-gray-500">No tasks yet</p>}</div>
        </div>
      </div>

      <h3 className="mt-6 mb-2 text-[12px] font-bold uppercase tracking-widest text-gray-500">Lifecycle stages</h3>
      <div className="grid gap-3 md:grid-cols-5">
        {EVENT_STATUS.map(s => <StatCard key={s} icon={Icon.events} label={s.replace(/_/g," ")} value={counts[s]} accent={s==="COMPLETED"?"purple":s==="EXECUTION"?"orange":s==="PROMOTION"?"blue":s==="POST_EVENT"?"purple":"gray"} />)}
      </div>

      <div className="mt-6 card">
        <div className="border-b border-gray-100 px-5 py-4 dark:border-white/5"><h3 className="text-base font-semibold">All events</h3></div>
        <table className="table-base">
          <thead><tr><th>Event</th><th>Type</th><th>Status</th><th>Program</th><th>Date</th><th>Tasks</th><th>Attendance</th><th></th></tr></thead>
          <tbody>
            {data.events.map(e => {
              const tasks = data.tasks.filter(t => t.eventId === e.id);
              const done = tasks.filter(t => t.status === "DONE").length;
              const att = e.registered ? Math.round((e.attended / e.registered) * 100) : 0;
              return (
                <tr key={e.id}>
                  <td><div className="font-medium">{e.name}</div><div className="text-xs text-gray-500">{e.location ?? e.country ?? "—"}</div></td>
                  <td>{e.type}</td>
                  <td>
                    <select value={e.status} onChange={ev=>moveStatus(e, ev.target.value)} className="stage-select uppercase">
                      {EVENT_STATUS.map(s => <option key={s} value={s}>{s}</option>)}
                    </select>
                  </td>
                  <td>{programById[e.programId]?.code ?? "—"}</td>
                  <td>{fmtDate(e.startDate)}</td>
                  <td>{done}/{tasks.length}</td>
                  <td className="text-xs">{e.attended}/{e.registered} ({att}%)</td>
                  <td><button onClick={()=>setViewing(e)} className="text-sm text-brand-700 hover:underline">Open</button></td>
                </tr>
              );
            })}
            {data.events.length === 0 && <tr><td colSpan="8" className="py-6 text-center text-gray-500">No events yet.</td></tr>}
          </tbody>
        </table>
      </div>

      <Modal open={creating || !!editing || !!viewing} onClose={()=>{setCreating(false); setEditing(null); setViewing(null);}}
             title={creating ? "New event" : editing ? "Edit event" : viewing?.name} size="lg">
        {(creating || editing) ? (
          <EventForm initial={editing} programs={data.programs} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} />
        ) : viewing ? (
          <div className="p-6">
            <div className="grid gap-3 md:grid-cols-4 mb-6 text-sm">
              <div><p className="text-xs uppercase text-gray-500">Type</p><p>{viewing.type}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Status</p><p><StageBadge stage={viewing.status}/></p></div>
              <div><p className="text-xs uppercase text-gray-500">Date</p><p>{fmtDate(viewing.startDate)}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Location</p><p>{viewing.location ?? viewing.country ?? "—"}</p></div>
            </div>

            <div className="mb-6">
              <h4 className="mb-2 text-sm font-semibold uppercase text-gray-500">Tasks ({data.tasks.filter(t=>t.eventId===viewing.id).filter(t=>t.status==="DONE").length}/{data.tasks.filter(t=>t.eventId===viewing.id).length})</h4>
              <div className="mb-3 grid grid-cols-12 gap-2">
                <input value={taskTitle} onChange={e=>setTaskTitle(e.target.value)} placeholder="Task title…" className="input col-span-7" />
                <select value={taskDept} onChange={e=>setTaskDept(e.target.value)} className="input col-span-3">{DEPARTMENTS.map(d=><option key={d.code} value={d.code}>{d.name}</option>)}</select>
                <button onClick={addTask} className="btn-primary col-span-2">+</button>
              </div>
              <ul className="space-y-1 text-sm">
                {data.tasks.filter(t => t.eventId === viewing.id).map(t => (
                  <li key={t.id} className="flex items-center justify-between rounded-md bg-gray-50 px-3 py-2">
                    <div className="flex items-center gap-3">
                      <button onClick={()=>toggleTask(t)} className={cls("h-4 w-4 rounded border", t.status==="DONE" ? "border-brand-500 bg-brand-500" : "border-gray-300")} />
                      <span className={t.status==="DONE" ? "line-through text-gray-400" : ""}>{t.title}</span>
                      <span className="text-xs text-gray-500">{DEPARTMENTS.find(d=>d.code===t.department)?.name ?? t.department}</span>
                    </div>
                    <StageBadge stage={t.status}/>
                  </li>
                ))}
              </ul>
            </div>

            <div className="flex justify-between border-t border-gray-100 pt-4">
              <button onClick={()=>remove(viewing)} className="btn-danger">Delete</button>
              <div className="space-x-2"><button onClick={()=>setViewing(null)} className="btn-ghost">Close</button><button onClick={()=>{setEditing(viewing); setViewing(null);}} className="btn-outline">Edit</button></div>
            </div>
          </div>
        ) : null}
      </Modal>
    </div>
  );
}

//  TASKS
// ════════════════════════════════════════════════════════════════════════
function TasksList({ data, update }) {
  const eventById = Object.fromEntries(data.events.map(e=>[e.id,e]));
  const [filterStatus, setFilterStatus] = useState("");
  const [filterDept, setFilterDept] = useState("");
  const filtered = data.tasks.filter(t => (!filterStatus || t.status===filterStatus) && (!filterDept || t.department===filterDept));
  const counts = TASK_STATUS.reduce((a,s)=>({...a,[s]:data.tasks.filter(t=>t.status===s).length}),{});

  const updateStatus = (t, status) => update(d => {
    const idx = d.tasks.findIndex(x=>x.id===t.id);
    d.tasks[idx].status = status;
    if (status === "DONE") d.tasks[idx].completedAt = new Date().toISOString();
    logAudit(d, "UPDATE", "Task", t.id);
    return d;
  });
  const remove = (t) => update(d => { d.tasks = d.tasks.filter(x=>x.id!==t.id); logAudit(d, "DELETE", "Task", t.id); return d; });

  const statusData = TASK_STATUS.map((s,i)=>({label:s.replace("_"," "), value:counts[s], color:["#94a3b8","#3b82f6","#ef4444","#3d9462"][i]})).filter(d=>d.value>0);
  const deptData = DEPARTMENTS.map(d => ({label:d.code, value:data.tasks.filter(t=>t.department===d.code).length})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
  const priorityData = PRIORITIES.map((p,i)=>({label:p, value:data.tasks.filter(t=>t.priority===p).length, color:["#94a3b8","#3b82f6","#fb7d12","#ef4444"][i]})).filter(d=>d.value>0);

  return (
    <div>
      <PageHeader title="Tasks" subtitle="Cross-departmental delivery items across events and programs." />
      <div className="grid gap-3 md:grid-cols-4">
        <StatCard icon={Icon.tasks}   label="TODO"        value={counts.TODO}        accent="gray"   />
        <StatCard icon={Icon.refresh} label="In progress" value={counts.IN_PROGRESS} accent="blue"   />
        <StatCard icon={Icon.alert}   label="Blocked"     value={counts.BLOCKED}     accent="red"    />
        <StatCard icon={Icon.check}   label="Done"        value={counts.DONE}        accent="green"  />
      </div>
      <div className="mt-5 grid gap-4 lg:grid-cols-3">
        <div className="card animate-fade-up"><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">By status</h3></div><div className="p-4"><DonutChart data={statusData} size={160} thickness={20}/></div></div>
        <div className="card animate-fade-up" style={{animationDelay:"0.05s"}}><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">By priority</h3></div><div className="p-4"><DonutChart data={priorityData} size={160} thickness={20}/></div></div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">By department</h3></div><div className="p-4 text-gray-700 dark:text-gray-300">{deptData.length ? <BarChart data={deptData.slice(0,8)} height={180}/> : <p className="py-8 text-center text-[12px] text-gray-500">No tasks</p>}</div></div>
      </div>
      <div className="mt-6 card">
        <div className="flex flex-wrap items-center justify-between gap-2 border-b border-gray-100 px-5 py-4 dark:border-white/5">
          <h3 className="text-base font-semibold">All tasks ({filtered.length})</h3>
          <div className="flex gap-2 text-xs">
            <select className="input !py-1.5" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="">Any status</option>{TASK_STATUS.map(s=><option key={s}>{s}</option>)}</select>
            <select className="input !py-1.5" value={filterDept} onChange={e=>setFilterDept(e.target.value)}><option value="">Any dept</option>{DEPARTMENTS.map(d=><option key={d.code} value={d.code}>{d.name}</option>)}</select>
          </div>
        </div>
        <table className="table-base">
          <thead><tr><th>Title</th><th>Department</th><th>Event</th><th>Priority</th><th>Status</th><th></th></tr></thead>
          <tbody>
            {filtered.map(t => (
              <tr key={t.id}>
                <td className={t.status==="DONE" ? "line-through text-gray-400" : ""}>{t.title}</td>
                <td className="text-xs">{DEPARTMENTS.find(d=>d.code===t.department)?.name ?? t.department ?? "—"}</td>
                <td className="text-xs">{eventById[t.eventId]?.name ?? "—"}</td>
                <td><StageBadge stage={t.priority}/></td>
                <td><select className="stage-select uppercase" value={t.status} onChange={e=>updateStatus(t, e.target.value)}>{TASK_STATUS.map(s=><option key={s}>{s}</option>)}</select></td>
                <td className="text-right"><button onClick={()=>remove(t)} title="Delete" className="action-icon action-icon-danger"><Icon.trash className="h-3.5 w-3.5"/></button></td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan="6" className="py-6 text-center text-gray-500">No tasks.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

//  COLLABORATION (activity timeline)

function Collaboration({ data }) {
  const userById = Object.fromEntries(data.users.map(u=>[u.id,u]));
  const sorted = [...data.activities].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt));
  return (
    <div>
      <PageHeader title="Internal Collaboration" subtitle="A unified feed of every signal across departments." />
      <div className="card">
        <div className="border-b border-gray-100 px-5 py-4 dark:border-white/5"><h3 className="text-base font-semibold">Activity timeline</h3></div>
        <div className="space-y-4 p-5">
          {sorted.map(a => {
            const link = a.partnershipId ? `#/partnerships` : a.programId ? `#/programs` : a.eventId ? `#/events` : a.hubId ? `#/members` : null;
            return (
              <div key={a.id} className="flex gap-3 border-b border-gray-100 pb-3 last:border-b-0">
                <div className="grid h-9 w-9 shrink-0 place-items-center rounded-full bg-brand-50 text-xs font-semibold text-brand-700">{(userById[a.userId]?.name ?? "S").slice(0,1)}</div>
                <div className="min-w-0 flex-1">
                  <div className="flex flex-wrap items-center gap-2">
                    <Badge tone={a.type?.includes("PARTNERSHIP") ? "green" : a.type?.includes("PROGRAM") ? "orange" : a.type?.includes("FUNDING") ? "blue" : a.type?.includes("EVENT") ? "purple" : a.type?.includes("HUB") ? "green" : "gray"}>{(a.type||"").replace(/_/g," ")}</Badge>
                    <p className="text-sm font-medium">{a.title}</p>
                  </div>
                  {a.body && <p className="mt-1 text-sm text-gray-600">{a.body}</p>}
                  <div className="mt-1 flex items-center gap-2 text-xs text-gray-500">
                    <span>{relTime(a.createdAt)}</span>
                    <span>·</span>
                    <span>{userById[a.userId]?.name ?? "system"}</span>
                    {link && <><span>·</span><a href={link} className="text-brand-700 hover:underline">Open</a></>}
                  </div>
                </div>
              </div>
            );
          })}
          {sorted.length === 0 && <p className="text-sm text-gray-500">No activity yet.</p>}
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
//  CAMPAIGNS
// ════════════════════════════════════════════════════════════════════════
function CampaignForm({ initial, hubs, onSave, onCancel }) {
  const [f, setF] = useState(initial || { name:"", channel:"EMAIL", audience:"ALL_HUBS", subject:"", body:"", status:"DRAFT" });
  const recipientsFor = (audience) => {
    if (audience === "ALL_HUBS") return hubs.length;
    if (audience === "PAID_HUBS") return hubs.filter(h => h.status === "ACTIVE").length;
    if (audience.startsWith("REGION:")) return hubs.filter(h => h.region === audience.slice(7)).length;
    if (audience.startsWith("TIER:")) return hubs.filter(h => h.membershipTier === audience.slice(5)).length;
    return 0;
  };
  const recipients = recipientsFor(f.audience);
  const submit = (e) => { e.preventDefault(); onSave({ ...f, recipients }); };
  return (
    <form onSubmit={submit} className="p-6 space-y-4">
      <div><label className="label">Name *</label><input className="input" required value={f.name} onChange={e=>setF({...f,name:e.target.value})} /></div>
      <div className="grid gap-4 md:grid-cols-2">

function CampaignsList({ data, update }) {
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const audienceLabel = (a) => a === "ALL_HUBS" ? "All hubs" : a === "PAID_HUBS" ? "Paid hubs" : a.startsWith("REGION:") ? "Region: " + a.slice(7) : a.startsWith("TIER:") ? "Tier: " + a.slice(5) : a;

  const save = (form) => {
    update(d => {
      if (editing) {
        const idx = d.campaigns.findIndex(c => c.id === editing.id);
        d.campaigns[idx] = { ...d.campaigns[idx], ...form, sentAt: form.status === "SENT" ? new Date().toISOString() : null };
        logAudit(d, "UPDATE", "Campaign", editing.id);
      } else {
        const id = uid();
        d.campaigns.push({ id, ...form, opens:0, clicks:0, createdById: d.settings.currentUserId, createdAt: new Date().toISOString(),
          sentAt: form.status === "SENT" ? new Date().toISOString() : null });
        if (form.status === "SENT") {
          logActivity(d, "CAMPAIGN_SENT", `Campaign sent: ${form.name}`, `${form.recipients} recipients`);
        }
        logAudit(d, "CREATE", "Campaign", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const remove = (c) => {
    if (!confirm("Delete this campaign?")) return;
    update(d => { d.campaigns = d.campaigns.filter(x => x.id !== c.id); logAudit(d, "DELETE", "Campaign", c.id); return d; });
  };

  const sent = data.campaigns.filter(c => c.status === "SENT");
  const reach = sent.reduce((s,c)=>s+(c.recipients||0), 0);
  const opens = sent.reduce((s,c)=>s+(c.opens||0), 0);
  const clicks = sent.reduce((s,c)=>s+(c.clicks||0), 0);
  const openRate = reach ? Math.round((opens/reach)*100) : 0;
  const clickRate = reach ? Math.round((clicks/reach)*100) : 0;
  const channelData = CAMPAIGN_CHANNELS.map((c,i)=>({label:c, value: data.campaigns.filter(x=>x.channel===c).length, color:["#3b82f6","#a855f7","#3d9462"][i]})).filter(d=>d.value>0);
  const statusData = CAMPAIGN_STATUS.map((s,i)=>({label:s, value: data.campaigns.filter(x=>x.status===s).length, color:["#94a3b8","#fb7d12","#3d9462"][i]})).filter(d=>d.value>0);
  return (
    <div>
      <PageHeader title="Campaigns & Ad Engine" subtitle="Broadcast opportunities to all hubs, paid members, regions or sectors."
        action={<button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> New campaign</button>} />
      <div className="grid gap-3 md:grid-cols-4">
        <StatCard icon={Icon.send}      label="Total reach" value={reach} hint={`${sent.length} sent`} accent="blue" trend={12} />
        <StatCard icon={Icon.eye}       label="Open rate" value={openRate + "%"} hint={`${opens} opens`} accent="green" />
        <StatCard icon={Icon.trending}  label="Click rate" value={clickRate + "%"} hint={`${clicks} clicks`} accent="orange" />
        <StatCard icon={Icon.campaigns} label="Total campaigns" value={data.campaigns.length} accent="purple" />
      </div>
      <div className="mt-5 grid gap-4 lg:grid-cols-2">
        <div className="card animate-fade-up"><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">By channel</h3></div><div className="p-4"><DonutChart data={channelData} size={160} thickness={20}/></div></div>
        <div className="card animate-fade-up" style={{animationDelay:"0.05s"}}><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">By status</h3></div><div className="p-4"><DonutChart data={statusData} size={160} thickness={20}/></div></div>
      </div>
      <h3 className="mt-6 mb-3 text-[14px] font-bold">All campaigns</h3>
      <div className="card">
        <table className="table-base">
          <thead><tr><th>Name</th><th>Channel</th><th>Audience</th><th>Status</th><th>Recipients</th><th>Engagement</th><th>Created</th><th></th></tr></thead>
          <tbody>
            {data.campaigns.map(c => (
              <tr key={c.id}>
                <td><div className="font-medium">{c.name}</div>{c.subject && <div className="text-xs text-gray-500">{c.subject}</div>}</td>
                <td><Badge tone="blue">{c.channel}</Badge></td>
                <td className="text-xs">{audienceLabel(c.audience)}</td>
                <td><StageBadge stage={c.status}/></td>
                <td>{c.recipients}</td>
                <td className="text-xs">{c.opens||0} opens · {c.clicks||0} clicks</td>
                <td className="text-[11px] text-gray-500">{relTime(c.createdAt)}</td>
                <td><div className="flex justify-end gap-1"><button onClick={()=>setEditing(c)} title="Edit" className="action-icon"><Icon.edit className="h-3.5 w-3.5"/></button><button onClick={()=>remove(c)} title="Delete" className="action-icon action-icon-danger"><Icon.trash className="h-3.5 w-3.5"/></button></div></td>
              </tr>
            ))}
            {data.campaigns.length === 0 && <tr><td colSpan="8" className="py-10 text-center text-gray-500">No campaigns yet.</td></tr>}
          </tbody>
        </table>
      </div>
      <Modal open={creating || !!editing} onClose={()=>{setCreating(false); setEditing(null);}} title={creating ? "New campaign" : "Edit campaign"} size="lg">
        <CampaignForm initial={editing} hubs={data.hubs} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} />
      </Modal>
    </div>
  );
}

function ProcurementList({ data, update }) {

  const save = (e) => {
    e.preventDefault();
    update(d => {
      const id = uid();
      d.bookings.push({ id, ...f, cost: f.cost ? Number(f.cost) : null, currency:"USD", startDate: f.startDate ? new Date(f.startDate).toISOString() : null, createdAt: new Date().toISOString() });
      logAudit(d, "CREATE", "Booking", id);
      return d;
    });
    setF({ type:"HOTEL", vendor:"", reference:"", cost:"", status:"REQUESTED", startDate:"" });

  const typeData = BOOKING_TYPES.map((t,i)=>({label:t, value: data.bookings.filter(b=>b.type===t).length, color:["#3b82f6","#fb7d12","#a855f7","#3d9462"][i]})).filter(d=>d.value>0);

            <button type="submit" className="btn-primary">Save</button>
          </div>
        </form>
      </Modal>
    </div>
  );
}

  const [f, setF] = useState({ name:"", email:"", role:"STAFF", department:"" });
  const byDept = {};
  data.users.forEach(u => { byDept[u.department || "—"] = (byDept[u.department || "—"] || 0) + 1; });

  const save = (e) => {
    e.preventDefault();
    update(d => {
      const id = uid();
      d.users.push({ id, ...f, department: f.department || null });
      logAudit(d, "CREATE", "User", id);
      return d;
    });
    setF({ name:"", email:"", role:"STAFF", department:"" });
    setCreating(false);
  };
  const remove = (u) => {
    if (data.users.length <= 1) return alert("Cannot remove last user.");
    if (!confirm(`Remove ${u.name}?`)) return;
    update(d => { d.users = d.users.filter(x => x.id !== u.id); logAudit(d, "DELETE", "User", u.id); return d; });
  };

  const headcountByDept = DEPARTMENTS.map(d => ({label:d.code, value:data.users.filter(u=>u.department===d.code).length})).filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
  const roleData = ROLES.map((r,i)=>({label:r.replace("_"," "), value:data.users.filter(u=>u.role===r).length, color:CHART_COLORS[i]})).filter(d=>d.value>0);
  return (
    <div>
      <PageHeader title="People (HR)" subtitle="Staff and role assignments."
        action={<button onClick={()=>setCreating(true)} className="btn-primary"><Icon.plus className="h-4 w-4"/> Add person</button>} />
      <div className="grid gap-3 md:grid-cols-3">
        <StatCard icon={Icon.people} label="Total people" value={data.users.length} accent="green" />
        <StatCard icon={Icon.depts}  label="Departments" value={DEPARTMENTS.length} accent="blue" />
        <StatCard icon={Icon.layers} label="Roles in use" value={new Set(data.users.map(u=>u.role)).size} accent="purple" />
      </div>
      <div className="mt-5 grid gap-4 lg:grid-cols-3">
        <div className="card lg:col-span-2 animate-fade-up"><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Headcount by department</h3></div><div className="p-4 text-gray-700 dark:text-gray-300">{headcountByDept.length ? <BarChart data={headcountByDept} height={200}/> : <p className="py-8 text-center text-[12px] text-gray-500">No staff assigned</p>}</div></div>
        <div className="card animate-fade-up" style={{animationDelay:"0.05s"}}><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Role mix</h3></div><div className="p-4"><DonutChart data={roleData} size={160} thickness={20}/></div></div>
      </div>
      <div className="mt-6 card">
        <table className="table-base">
          <thead><tr><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th></th></tr></thead>
          <tbody>
            {data.users.map(u => (
              <tr key={u.id}>
                <td>
                  <div className="flex items-center gap-2.5">
                    <div className="grid h-7 w-7 place-items-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-[10px] font-bold text-white">{u.name.split(" ").map(n=>n[0]).slice(0,2).join("")}</div>
                    <span className="font-semibold text-[13px]">{u.name}</span>
                  </div>
                </td>
                <td className="text-[12px] text-gray-500">{u.email}</td>
                <td><Badge tone={u.role==="SUPER_ADMIN"?"purple":u.role==="COO"||u.role==="ED"?"orange":"blue"}>{u.role.replace("_"," ")}</Badge></td>
                <td className="text-[12px]">{DEPARTMENTS.find(d=>d.code===u.department)?.name ?? <span className="text-gray-400">—</span>}</td>
                <td className="text-right"><button onClick={()=>remove(u)} title="Remove" className="action-icon action-icon-danger"><Icon.trash className="h-3.5 w-3.5"/></button></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <Modal open={creating} onClose={()=>setCreating(false)} title="Add person" size="md">
        <form onSubmit={save} className="p-6 space-y-4">
          <div className="grid gap-4 md:grid-cols-2">
            <div><label className="label">Name *</label><input required className="input" value={f.name} onChange={e=>setF({...f,name:e.target.value})} /></div>
            <div><label className="label">Email *</label><input type="email" required className="input" value={f.email} onChange={e=>setF({...f,email:e.target.value})} /></div>
            <div><label className="label">Role</label><select className="input" value={f.role} onChange={e=>setF({...f,role:e.target.value})}>{ROLES.map(r=><option key={r}>{r}</option>)}</select></div>
            <div><label className="label">Department</label><select className="input" value={f.department} onChange={e=>setF({...f,department:e.target.value})}><option value="">—</option>{DEPARTMENTS.map(d=><option key={d.code} value={d.code}>{d.name}</option>)}</select></div>
          </div>
          <div className="flex justify-end gap-2 border-t border-gray-100 pt-4">
            <button type="button" onClick={()=>setCreating(false)} className="btn-ghost">Cancel</button>
            <button type="submit" className="btn-primary">Add</button>
          </div>
        </form>
      </Modal>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
function Africonnect({ data, update }) {
  const synced = data.hubs.filter(h => h.africonnectId).length;
  const fileRef = useRef();
  const exportSync = () => {
    const payload = { generatedAt: new Date().toISOString(), hubs: data.hubs.map(h => ({...h, africonnectId: h.africonnectId})) };
    download(`africonnect-sync-${Date.now()}.json`, JSON.stringify(payload, null, 2));
    update(d => { d.syncLog.unshift({ id: uid(), endpoint:"/sync/hubs", direction:"OUT", status:"OK", recordCount: data.hubs.length, createdAt: new Date().toISOString() }); return d; });
  };
  const importSync = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const payload = JSON.parse(ev.target.result);
        if (!Array.isArray(payload.hubs)) throw new Error("Expected { hubs: [...] }");
        update(d => {
          let upserted = 0;
          payload.hubs.forEach(h => {
            const idx = d.hubs.findIndex(x => x.africonnectId === h.africonnectId);
            if (idx >= 0) { d.hubs[idx] = { ...d.hubs[idx], ...h }; upserted++; }
            else if (h.name && h.country) { d.hubs.push({ ...h, id: uid() }); upserted++; }
          });
          d.syncLog.unshift({ id: uid(), endpoint:"/sync/hubs", direction:"IN", status:"OK", recordCount: upserted, createdAt: new Date().toISOString() });
          return d;
        });
        alert(`Imported ${payload.hubs.length} hubs`);
      } catch (err) { alert("Import failed: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  const directionData = [
    { label:"OUT", value: data.syncLog.filter(l=>l.direction==="OUT").length, color:"#a855f7" },
    { label:"IN",  value: data.syncLog.filter(l=>l.direction==="IN").length,  color:"#3b82f6" },
  ].filter(d=>d.value>0);
  const recordsByEndpoint = ["/sync/hubs","/sync/programs","/sync/activities"].map(ep => ({label: ep.replace("/sync/",""), value: data.syncLog.filter(l=>l.endpoint===ep).reduce((s,l)=>s+l.recordCount, 0)})).filter(d=>d.value>0);
  // Coverage history projection (synthetic) for the trend chart
  const coverageHistory = (() => {
    const months = ["Jul","Aug","Sep","Oct","Nov","Dec","Jan"];
    const total = data.hubs.length || 1;
    return months.map((m, i) => ({ label: m, value: Math.round(total * (0.45 + (i / months.length) * 0.55)) }));

  const benefits = [
    { icon: Icon.layers,       title: "Shared hub profiles", desc: "One source of truth — your hub data flows seamlessly between Africonnect and Ecosystem OS." },
    { icon: Icon.refresh,      title: "Real-time activity sync", desc: "Member events, milestones, and announcements stream automatically across both platforms." },
    { icon: Icon.intel,        title: "Single sign-on (SSO)", desc: "Members log in once and access tools, programmes, and resources across the ecosystem." },
    { icon: Icon.send,         title: "Continent-wide visibility", desc: "Be discoverable to investors, donors, and partners actively searching the ecosystem." },
    { icon: Icon.trending,     title: "Aggregated analytics", desc: "Benchmark your hub against regional peers with privacy-respecting comparative insights." },
    { icon: Icon.bookmark,     title: "Priority programme access", desc: "Synced hubs get first-look invitations to accelerators, grants, and partnership rounds." },
  ];

  return (
    <div>
      {/* HERO — gradient with Africonnect description and primary CTA */}
      <div className="relative mb-6 overflow-hidden rounded-2xl bg-gradient-to-br from-brand-700 via-brand-600 to-accent-600 text-white shadow-xl shadow-brand-700/20">
        <div className="absolute inset-0 opacity-30 mix-blend-overlay">
          <div className="absolute -left-20 -top-20 h-64 w-64 rounded-full bg-brand-300 blur-3xl"/>
          <div className="absolute -bottom-24 -right-16 h-72 w-72 rounded-full bg-accent-400 blur-3xl"/>
        </div>
        <div className="accent-strip absolute inset-x-0 top-0 h-1"></div>
        <div className="relative grid gap-6 p-7 md:grid-cols-5 lg:p-9">
          <div className="md:col-span-3">
            <div className="inline-flex items-center gap-2 rounded-full border border-white/30 bg-white/10 px-2.5 py-1 text-[10px] font-bold uppercase tracking-[0.18em] backdrop-blur">
              <span className="live-dot" style={{background:"#fff"}}/> The Africonnect Integration Layer
            </div>
            <h1 className="mt-4 text-[28px] font-black leading-tight md:text-[34px]">
              One ecosystem. <span className="text-accent-200">Connected.</span>
            </h1>
            <p className="mt-3 max-w-xl text-[14px] leading-relaxed text-white/85">
              <strong className="text-white">Africonnect</strong> is the unified network for African innovation hubs — a shared identity layer, activity sync engine, and discoverability platform for over 500 hubs and the partners working with them.
              When your Ecosystem OS workspace is connected to Africonnect, your hub becomes part of a continent-scale network: your profile is shared, your activities sync in real time, and you become eligible for partnership opportunities sourced through the central platform.
            </p>
            <div className="mt-6 flex flex-wrap items-center gap-3">
              <a href="https://africonnect.net/" target="_blank" rel="noopener noreferrer"
                 className="group inline-flex items-center gap-2 rounded-xl bg-white px-6 py-3 text-[14px] font-bold text-brand-800 shadow-xl shadow-black/10 hover:shadow-2xl hover:scale-[1.02] transition-all">
                Join Africonnect now
                <Icon.external className="h-4 w-4 transition group-hover:translate-x-0.5"/>
              </a>
              <a href="#/audit" className="rounded-xl border border-white/30 bg-white/10 px-5 py-3 text-[13px] font-semibold backdrop-blur hover:bg-white/15 transition">
                Why integrate?

            </div>
            <p className="mt-3 text-[11px] text-white/70">Opens https://africonnect.net/ in a new tab</p>

      {/* PROGRESS — charts on integration achievements */}
      <div className="mb-6 grid gap-4 lg:grid-cols-3">

      {recordsByEndpoint.length > 0 && (

      </div>
    </div>
  );
