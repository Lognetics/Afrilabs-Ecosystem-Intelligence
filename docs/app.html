//  AUDIT
// ════════════════════════════════════════════════════════════════════════
function AuditLog({ data }) {
  const actionData = ["CREATE","UPDATE","DELETE","LOGIN","SYNC","EXPORT"].map((a,i)=>({label:a, value: data.auditLog.filter(l=>l.action===a).length, color:["#3d9462","#3b82f6","#ef4444","#a855f7","#fb7d12","#94a3b8"][i]})).filter(d=>d.value>0);
  const entityData = {};
  data.auditLog.forEach(l => { entityData[l.entity] = (entityData[l.entity] || 0) + 1; });
  const entityList = Object.entries(entityData).sort((a,b)=>b[1]-a[1]).slice(0, 8).map(([label, value]) => ({label, value}));
  // Activity over last 14 days
  const days = Array.from({length: 14}, (_, i) => { const d = new Date(); d.setDate(d.getDate() - (13-i)); d.setHours(0,0,0,0); return d.getTime(); });
  const auditTrend = days.map((day, i) => {
    const next = i < days.length-1 ? days[i+1] : day + 86400000;
    return data.auditLog.filter(l => { const t = new Date(l.createdAt).getTime(); return t >= day && t < next; }).length;
  });

  return (
    <div>
      <PageHeader title="Audit & Compliance" subtitle="Immutable record of system events, financial actions and integrations." />
      <div className="grid gap-3 md:grid-cols-4">
        <StatCard icon={Icon.audit}    label="Total events"  value={data.auditLog.length} accent="green" sparkline={auditTrend} />
        <StatCard icon={Icon.refresh}  label="Last 24h"      value={data.auditLog.filter(l => Date.now() - new Date(l.createdAt).getTime() < 86400000).length} accent="blue" />
        <StatCard icon={Icon.contacts} label="Unique actors" value={new Set(data.auditLog.map(l=>l.actorEmail)).size} accent="purple" />
        <StatCard icon={Icon.layers}   label="Entity types"  value={Object.keys(entityData).length} accent="orange" />
      </div>
      <div className="mt-5 grid gap-4 lg:grid-cols-3">
        <div className="card animate-fade-up"><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Action mix</h3></div><div className="p-4"><DonutChart data={actionData} size={160} thickness={20}/></div></div>
        <div className="card lg:col-span-2 animate-fade-up" style={{animationDelay:"0.05s"}}><div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Top affected entities</h3><p className="text-[11px] text-gray-500">Most-touched models</p></div><div className="p-4 text-gray-700 dark:text-gray-300">{entityList.length ? <BarChart data={entityList} height={200}/> : <p className="py-8 text-center text-[12px] text-gray-500">No events</p>}</div></div>
      </div>
      <h3 className="mt-6 mb-3 text-[14px] font-bold">Recent activity ({Math.min(200, data.auditLog.length)})</h3>
      <div className="card">
        <table className="table-base">
          <thead><tr><th>When</th><th>Actor</th><th>Action</th><th>Entity</th><th>Reference</th></tr></thead>
          <tbody>
            {data.auditLog.slice(0,200).map(l => (
              <tr key={l.id}>
                <td className="text-xs">{relTime(l.createdAt)}</td>
                <td className="text-gray-700">{l.actorEmail}</td>
                <td><Badge tone={l.action==="DELETE"?"red":l.action==="CREATE"?"green":"blue"}>{l.action}</Badge></td>
                <td>{l.entity}</td>
                <td className="font-mono text-xs text-gray-500">{l.entityId ?? "—"}</td>
              </tr>
            ))}
            {data.auditLog.length === 0 && <tr><td colSpan="5" className="py-6 text-center text-gray-500">No audit events.</td></tr>}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
//  SETTINGS
// ════════════════════════════════════════════════════════════════════════
function Settings({ data, update }) {
  const fileRef = useRef();
  const exportAll = () => download(`afrilabs-os-export-${Date.now()}.json`, JSON.stringify(data, null, 2));
  const importAll = (e) => {
    const file = e.target.files?.[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const payload = JSON.parse(ev.target.result);
        if (payload.version !== 1) throw new Error("Incompatible export version");
        update(() => payload);
        alert("Import complete. Reloading…");
        setTimeout(()=>window.location.reload(), 500);
      } catch (err) { alert("Import failed: " + err.message); }
    };
    reader.readAsText(file);
    e.target.value = "";
  };
  const reset = () => {
    if (!confirm("Reset all data to seed? This is destructive — export first if you want to keep your data.")) return;
    localStorage.removeItem(STORE_KEY);
    window.location.reload();
  };
  const wipeAll = () => {
    if (!confirm("Erase all data — including seed? You'll start fully empty.")) return;
    update(() => ({
      ...buildSeed(),
      hubs:[], payments:[], partners:[], partnerships:[], partnershipPrograms:[],
      programs:[], programHubs:[], fundingSources:[], events:[], eventPartners:[],
      tasks:[], campaigns:[], activities:[], bookings:[], jobs:[], auditLog:[], syncLog:[],
    }));
  };

  return (
    <div className="max-w-3xl">
      <PageHeader title="Settings & Data" subtitle="Your data lives in your browser's localStorage. Export to keep, import to restore." />

      <div className="space-y-4">
        <div className="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
          <h3 className="font-semibold">Sovereignty (your data)</h3>
          <p className="mt-1 text-sm text-gray-600">Everything you create in this app is stored in your browser only. There is no server. To preserve or move data, use Export/Import below.</p>
          <div className="mt-3 flex flex-wrap gap-2">
            <button onClick={exportAll} className="btn-primary">↓ Export all data</button>
            <button onClick={()=>fileRef.current?.click()} className="btn-outline">↑ Import JSON</button>
            <input ref={fileRef} type="file" accept="application/json" onChange={importAll} className="hidden" />
          </div>
        </div>

        <div className="rounded-xl border border-gray-200 bg-white p-5 shadow-sm">
          <h3 className="font-semibold">Data stats</h3>
          <div className="mt-2 grid gap-2 md:grid-cols-3 text-sm">
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Hubs:</span> <b>{data.hubs.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Partnerships:</span> <b>{data.partnerships.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Programs:</span> <b>{data.programs.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Funding:</span> <b>{data.fundingSources.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Events:</span> <b>{data.events.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Tasks:</span> <b>{data.tasks.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Campaigns:</span> <b>{data.campaigns.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Activities:</span> <b>{data.activities.length}</b></div>
            <div className="rounded-md bg-gray-50 px-3 py-2"><span className="text-gray-500">Audit log:</span> <b>{data.auditLog.length}</b></div>
          </div>
        </div>

        <div className="rounded-xl border border-red-200 bg-red-50/30 p-5 shadow-sm">
          <h3 className="font-semibold text-red-800">Danger zone</h3>
          <p className="mt-1 text-sm text-red-700">These actions cannot be undone. Export first.</p>
          <div className="mt-3 flex flex-wrap gap-2">
            <button onClick={reset} className="btn-outline">Reset to seed data</button>
            <button onClick={wipeAll} className="btn-danger">Erase all data</button>
          </div>
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════════
//  APP
// ════════════════════════════════════════════════════════════════════════
function App() {
  const [data, update] = useStore();
  const route = useRoute();
  const [search, setSearch] = useState("");
  const [theme, toggleTheme] = useTheme();

  let body;
  if (route === "/dashboard") body = <Dashboard data={data} />;
  else if (route === "/crm" || route.startsWith("/crm/")) body = <CRMHome data={data} update={update} search={search} route={route} />;
  else if (route === "/members" || route === "/hubs") body = <HubsList data={data} update={update} search={search} />;
  else if (route === "/partnerships") body = <PartnershipsList data={data} update={update} search={search} />;
  else if (route === "/programs") body = <ProgramsList data={data} update={update} search={search} />;
  else if (route === "/funding") body = <FundingList data={data} update={update} />;
  else if (route === "/events") body = <EventsList data={data} update={update} />;
  else if (route === "/tasks") body = <TasksList data={data} update={update} />;
  else if (route === "/collaboration") body = <Collaboration data={data} />;
  else if (route === "/campaigns") body = <CampaignsList data={data} update={update} />;
  else if (route === "/intelligence") body = <Intelligence data={data} />;
  else if (route === "/procurement") body = <ProcurementList data={data} update={update} />;
  else if (route === "/jobs") body = <JobsList data={data} update={update} />;
  else if (route === "/people") body = <PeopleList data={data} update={update} />;
  else if (route === "/africonnect") body = <Africonnect data={data} update={update} />;
  else if (route === "/audit") body = <AuditLog data={data} />;
  else if (route === "/departments") body = <DepartmentsView data={data} />;
  else if (route === "/settings") body = <Settings data={data} update={update} />;
  else body = <div className="text-center py-20"><h2 className="text-xl font-bold">Page not found</h2><a href="#/dashboard" className="text-brand-700 hover:underline">← Back to dashboard</a></div>;

  return <Shell data={data} update={update} route={route} search={search} setSearch={setSearch} theme={theme} toggleTheme={toggleTheme}>{body}</Shell>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
