const fmtDate = d => !d ? "—" : new Date(d).toLocaleDateString("en-US",{year:"numeric",month:"short",day:"numeric"});
const relTime = d => {
  if (!d) return "—";
  const diff = Date.now() - new Date(d).getTime();
  const s = Math.floor(diff/1000);
  if (s<60) return s+"s ago";
  const m = Math.floor(s/60); if (m<60) return m+"m ago";
  const h = Math.floor(m/60); if (h<24) return h+"h ago";
  const dy = Math.floor(h/24); if (dy<30) return dy+"d ago";
  return new Date(d).toLocaleDateString();
};

//  STORE (localStorage)
// ════════════════════════════════════════════════════════════════════════
const STORE_KEY = "afrilabs-ecosystem-os-v1";

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (!raw) return buildSeed();
    const parsed = JSON.parse(raw);
    if (parsed && parsed.version === 1) {
      // Migrate: ensure CRM arrays exist on stores from earlier versions
      const seed = buildSeed();
      const ensure = (k) => { if (!Array.isArray(parsed[k])) parsed[k] = seed[k]; };
      ["contacts","deals","crmActivities","notes","syncLog"].forEach(ensure);
      return parsed;
    }
    return buildSeed();
  } catch (e) { return buildSeed(); }
}
function saveStore(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) { console.error("Save failed", e); }
}

// Hook: subscribe to and update the store
function useStore() {
  const [data, setData] = useState(loadStore);
  const update = useCallback((mutator) => {
    setData(prev => {
      const next = typeof mutator === "function" ? mutator(structuredClone(prev)) : { ...prev, ...mutator };
      saveStore(next);
      return next;
    });
  }, []);
  return [data, update];
}

// ════════════════════════════════════════════════════════════════════════
//  ROUTING (hash + pathname-aware so /crm, /tasks etc. work as direct URLs)
// ════════════════════════════════════════════════════════════════════════
function getRoute() {
  // Hash takes precedence for SPA navigation; otherwise infer from pathname.
  if (window.location.hash) return window.location.hash.slice(1) || "/dashboard";
  const path = window.location.pathname.replace(/\/+$/, "");
  // /app or /app.html → default
  if (!path || path === "/app" || path === "/app.html" || path === "/index.html") return "/dashboard";
  // Treat the rest (/crm, /crm/contacts, /tasks, /procurement, /people, /settings,
  // /partnerships, /programs, etc.) as the route directly
  return path;
}
function useRoute() {
  const [route, setRoute] = useState(getRoute);
  useEffect(() => {
    const onChange = () => setRoute(getRoute());
    window.addEventListener("hashchange", onChange);
    window.addEventListener("popstate", onChange);
    return () => { window.removeEventListener("hashchange", onChange); window.removeEventListener("popstate", onChange); };
  }, []);
  return route;
}
const navigate = (p) => { window.location.hash = p; };

          <p className="mt-0.5 truncate text-[22px] font-black leading-[1.15] tracking-tight text-gray-900 dark:text-gray-50">{value}</p>
          {hint && <p className="mt-0.5 truncate text-[11px] text-gray-500 dark:text-gray-400">{hint}</p>}
        </div>
        {interactive && <Icon.chevronRight className="h-4 w-4 shrink-0 text-gray-300 group-hover:text-brand-500 transition"/>}
      </div>
      {sparkline && <div className="mt-2.5 -mb-1"><SparkLine data={sparkline} color={a.color} height={28} width={220} /></div>}
    </>
  );
  const cls_outer = cls(
    "group rounded-2xl border border-gray-200/80 bg-white p-3.5 transition dark:border-white/[0.06] dark:bg-ink-800/60",
    "hover:shadow-md hover:-translate-y-0.5",
    a.hoverBorder,
    interactive && "cursor-pointer"
  );
  if (href) return <a href={href} className={cls_outer + " block"}>{inner}</a>;
  if (onClick) return <button onClick={onClick} className={cls_outer + " w-full text-left"}>{inner}</button>;
  return <div className={cls_outer}>{inner}</div>;
}

//  CHART COMPONENTS (custom SVG, no external deps)
// ════════════════════════════════════════════════════════════════════════
const CHART_COLORS = ["#3d9462","#fb7d12","#3b82f6","#a855f7","#eab308","#10b981","#ef4444","#06b6d4","#8b5cf6","#f97316"];

function BarChart({ data, height=200, animate=true }) {
  // Render with HTML labels (no SVG text clipping). Bars are SVG, labels HTML below.
  const max = Math.max(...data.map(d => d.value), 1);
  const chartH = height - 28; // reserve space for label row
  return (
    <div style={{height}}>
      <div className="relative" style={{height: chartH}}>
        <svg viewBox={`0 0 100 ${chartH}`} preserveAspectRatio="none" className="absolute inset-0 h-full w-full overflow-visible">
          <defs>
            <linearGradient id="bar-grad" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stopColor="#52a8b4"/><stop offset="100%" stopColor="#2a727f"/>
            </linearGradient>
          </defs>
          {[0.25, 0.5, 0.75, 1].map(p => (
            <line key={p} x1="0" x2="100" y1={chartH*(1-p)} y2={chartH*(1-p)}
                  stroke="currentColor" strokeOpacity="0.06" strokeWidth="0.3" vectorEffect="non-scaling-stroke" />
          ))}
        </svg>
        <div className="absolute inset-0 flex items-end gap-1.5 px-1">
          {data.map((d, i) => {
            const pct = (d.value / max) * 100;
            return (
              <div key={i} className="group relative flex flex-1 flex-col items-center justify-end">
                <span className="mb-1 text-[10px] font-bold text-gray-700 dark:text-gray-200 opacity-0 group-hover:opacity-100 transition">{d.value}</span>
                <div className="w-full rounded-t-md transition-all hover:brightness-110"
                     style={{
                       height: `${pct}%`,
                       background: d.color || "url(#bar-grad)",
                       backgroundImage: !d.color ? "linear-gradient(180deg,#52a8b4,#2a727f)" : undefined,
                       transformOrigin: "bottom",
                       animation: animate ? `grow-bar 0.9s cubic-bezier(0.4,0,0.2,1) ${i*0.04}s both` : undefined,
                     }}
                     title={`${d.label}: ${d.value}`}>
                </div>
              </div>
            );
          })}
        </div>
      </div>
      {/* Labels row — HTML for proper truncation */}
      <div className="mt-1.5 flex gap-1.5 px-1">
        {data.map((d, i) => (
          <div key={i} className="flex-1 truncate text-center text-[10px] font-medium text-gray-500 dark:text-gray-400" title={d.label}>{d.label}</div>
        ))}
      </div>
    </div>
  );
}

function DonutChart({ data, size=180, thickness=22 }) {
  const total = data.reduce((s,d)=>s+d.value, 0) || 1;
  const radius = size/2 - thickness/2 - 4;
  const cx = size/2, cy = size/2;
  let cumulative = 0;
  const segments = data.map((d, i) => {
    const start = (cumulative / total) * 2 * Math.PI;
    const end = ((cumulative + d.value) / total) * 2 * Math.PI;
    cumulative += d.value;
    const x1 = cx + radius * Math.sin(start), y1 = cy - radius * Math.cos(start);
    const x2 = cx + radius * Math.sin(end), y2 = cy - radius * Math.cos(end);
    const large = end - start > Math.PI ? 1 : 0;
    return { d:`M ${x1} ${y1} A ${radius} ${radius} 0 ${large} 1 ${x2} ${y2}`, color: d.color || CHART_COLORS[i % CHART_COLORS.length], label: d.label, value: d.value, pct: Math.round((d.value/total)*100) };
  });
  return (
    <div className="flex flex-col items-stretch gap-4 sm:flex-row sm:items-center">
      <svg width={size} height={size} className="mx-auto shrink-0 animate-scale-in">
        {segments.map((s,i) => (
          <path key={i} d={s.d} stroke={s.color} strokeWidth={thickness} fill="none" strokeLinecap="round" className="transition-[stroke-width] duration-200 hover:[stroke-width:26]">
            <title>{s.label}: {s.value} ({s.pct}%)</title>
          </path>
        ))}
        <text x={cx} y={cy-2} textAnchor="middle" fontSize="15" fontWeight="800" fill="currentColor">{total >= 1000 ? (total/1000).toFixed(1)+"k" : total}</text>
        <text x={cx} y={cy+13} textAnchor="middle" fontSize="9" fill="currentColor" opacity="0.55">total</text>
      </svg>
      <div className="flex-1 space-y-1.5 text-[12px]">
        {segments.map((s,i) => (
          <div key={i} className="grid grid-cols-[12px_1fr_auto_36px] items-center gap-2">
            <span className="h-2.5 w-2.5 shrink-0 rounded-full" style={{background:s.color}}></span>
            <span className="truncate text-gray-700 dark:text-gray-300" title={s.label}>{s.label}</span>
            <span className="font-mono text-[11px] font-semibold text-gray-900 dark:text-gray-100">{s.value >= 1000 ? (s.value/1000).toFixed(1)+"k" : s.value}</span>
            <span className="text-right text-[10px] tabular-nums text-gray-500">{s.pct}%</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function SparkLine({ data, color="#3d9462", height=40, width=120 }) {
  if (!data.length) return null;
  const max = Math.max(...data, 1), min = Math.min(...data, 0);
  const range = max - min || 1;
  const points = data.map((v, i) => `${(i/(data.length-1))*width},${height - ((v-min)/range)*(height-4) - 2}`).join(" ");
  return (
    <svg width={width} height={height} className="overflow-visible">
      <defs>
        <linearGradient id="spark-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.3"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${height} ${points} ${width},${height}`} fill="url(#spark-grad)" />
      <polyline points={points} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="animate-fade-in" />
      <circle cx={width} cy={height - ((data[data.length-1]-min)/range)*(height-4) - 2} r="3" fill={color} />
    </svg>
  );
}

function ProgressRing({ value, max=100, size=80, thickness=8, color="#3d9462", label }) {
  const radius = size/2 - thickness/2;
  const circumference = 2 * Math.PI * radius;
  const offset = circumference - (Math.min(value,max)/max) * circumference;
  return (
    <div className="relative inline-flex items-center justify-center">
      <svg width={size} height={size} className="-rotate-90">
        <circle cx={size/2} cy={size/2} r={radius} stroke="currentColor" strokeWidth={thickness} fill="none" opacity="0.1" />
        <circle cx={size/2} cy={size/2} r={radius} stroke={color} strokeWidth={thickness} fill="none" strokeLinecap="round"
                strokeDasharray={circumference} strokeDashoffset={offset} style={{transition:"stroke-dashoffset 1s ease-out"}} />
      </svg>
      <div className="absolute text-center">
        <div className="text-lg font-bold leading-none">{value}{label?"":"%"}</div>
        {label && <div className="mt-0.5 text-[10px] uppercase tracking-wider text-gray-500">{label}</div>}
      </div>
    </div>
  );
}

function hubPaymentStatus(hub, payments) {
  const ps = payments.filter(p => p.hubId === hub.id);
  const now = new Date();
  if (ps.some(p => p.status === "PAID" && new Date(p.periodEnd) > now)) return "paid";
  if (ps.some(p => p.status === "PENDING")) return "pending";
  return "expired";
}

// ════════════════════════════════════════════════════════════════════════
//  INTELLIGENCE (rule-based)
// ════════════════════════════════════════════════════════════════════════
function computeIntelligence(data) {
  const now = Date.now();
  // Hub priorities
  const priorities = data.hubs.map(h => {
    let score = h.engagementScore;
    const signals = [];
    const ps = data.payments.filter(p => p.hubId === h.id);
    const paid = ps.filter(p => p.status === "PAID");
    const overdue = ps.filter(p => p.status === "OVERDUE" || p.status === "EXPIRED");
    if (paid.length > 0) { score += 15; signals.push("active subscription"); }
    if (h.membershipTier === "PREMIUM") { score += 10; signals.push("premium tier"); }
    if (h.membershipTier === "STRATEGIC") { score += 20; signals.push("strategic tier"); }
    if (overdue.length > 0) { score -= 25; signals.push(`${overdue.length} overdue`); }
    return { hubId: h.id, hubName: h.name, score: Math.max(0, Math.min(100, score)), signals };
  }).sort((a,b)=>b.score-a.score).slice(0,10);

  // Churn risk
  const churn = data.hubs.map(h => {
    let risk = 0;
    const reasons = [];
    if (h.engagementScore < 40) { risk += 30; reasons.push("low engagement"); }
    const ps = data.payments.filter(p => p.hubId === h.id);
    const overdue = ps.filter(p => p.status === "OVERDUE" || p.status === "EXPIRED");
    if (overdue.length > 0) { risk += 25 * Math.min(2, overdue.length); reasons.push(`${overdue.length} overdue`); }
    if (h.status === "SUSPENDED") { risk += 15; reasons.push("suspended"); }
    if (ps.length === 0) { risk += 20; reasons.push("no payments"); }
    return { hubId: h.id, hubName: h.name, risk: Math.min(100, risk), reasons };
  }).filter(x => x.risk >= 40).sort((a,b)=>b.risk-a.risk);

  // Partner-program matches
  const matches = [];
  const activePrograms = data.programs.filter(p => p.status === "ACTIVE");
  data.partners.forEach(p => {
    activePrograms.forEach(prog => {
      let fit = 30; const r = [];
      if (p.region && prog.region && p.region === prog.region) { fit += 30; r.push("region match"); }
      if (p.sector && prog.name.toLowerCase().includes((p.sector||"").toLowerCase())) { fit += 20; r.push("sector match"); }
      if (p.type === "INVESTOR" && prog.type === "ACCELERATOR") { fit += 25; r.push("investor↔accelerator"); }
      if (p.type === "DONOR" && prog.type === "INITIATIVE") { fit += 20; r.push("donor↔initiative"); }
      if (p.type === "CORPORATE" && prog.type === "ECOSYSTEM_PROJECT") { fit += 15; r.push("corporate↔project"); }
      if (fit >= 55) matches.push({ partnerId:p.id, partnerName:p.name, programId:prog.id, programName:prog.name, fitScore:Math.min(100, fit), rationale:r });
    });
  });
  matches.sort((a,b)=>b.fitScore-a.fitScore);

  // Funding success
  const funding = data.fundingSources.filter(f => f.status === "PLEDGED" || f.status === "APPROVED").map(f => {
    let l = 50; const drivers = [];
    if (f.status === "APPROVED") { l += 30; drivers.push("approved"); }
    const partner = data.partners.find(p => p.id === f.partnerId);
    if (partner?.type === "INVESTOR") { l += 10; drivers.push("investor"); }
    if (f.amount > 1000000) { l -= 10; drivers.push("large amount"); }
    if (f.amount < 100000) { l += 10; drivers.push("small ticket"); }
    const program = data.programs.find(p => p.id === f.programId);
    if (program?.status === "ACTIVE") { l += 5; drivers.push("active program"); }
    return { fundingId: f.id, name: f.name, successLikelihood: Math.max(0, Math.min(100, l)), drivers };
  }).sort((a,b)=>b.successLikelihood-a.successLikelihood);

  return { priorities, churn, matches: matches.slice(0,15), funding };
}

// ════════════════════════════════════════════════════════════════════════
//  LOGO — original SVG using concentric-ring-of-dots geometric motif
//  in the brand teal + coral palette
// ════════════════════════════════════════════════════════════════════════
function Logo({ size=36, withText=false, textColor="currentColor" }) {
  // Concentric rings: outer (12 dots), middle (8 dots), inner (6 dots), centre (1 dot)
  const cx = 50, cy = 50;
  const ringDots = (count, radius, fill, dotR, phase=0) =>
    Array.from({length: count}, (_, i) => {
      const angle = (i / count) * Math.PI * 2 + phase;
      return <circle key={`${radius}-${i}`} className="logo-dot"
        cx={cx + radius * Math.cos(angle)} cy={cy + radius * Math.sin(angle)}
        r={dotR} fill={fill} />;
    });
  return (
    <span className="inline-flex items-center gap-2.5">
      <svg className="logo-svg" width={size} height={size} viewBox="0 0 100 100" aria-label="Afrilabs">
        {/* outer teal ring (large dots) */}
        {ringDots(12, 40, "#338e9b", 4.5, 0)}
        {/* upper-mid coral ring (smaller, inset) */}
        {ringDots(10, 31, "#ea6a32", 3.6, Math.PI/10)}
        {/* mid teal ring */}
        {ringDots(8, 22, "#52a8b4", 3.0, 0)}
        {/* inner coral */}
        {ringDots(6, 13, "#f28851", 2.5, Math.PI/6)}
        {/* centre teal */}
        <circle className="logo-dot" cx={cx} cy={cy} r="3.2" fill="#265c66" />
      </svg>
      {withText && (
        <span className="leading-none">
          <span className="block text-[15px] font-extrabold tracking-tight" style={{color: textColor}}>AfriLabs</span>
          <span className="block text-[9px] font-bold uppercase tracking-[0.18em] text-gray-500 dark:text-gray-400">Ecosystem OS</span>
        </span>
      )}
    </span>
  );
}

// Theme management hook
function useTheme() {
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem("afrilabs-theme") || "light"; } catch { return "light"; }
  });
  useEffect(() => {
    if (theme === "dark") document.documentElement.classList.add("dark");
    else document.documentElement.classList.remove("dark");
    try { localStorage.setItem("afrilabs-theme", theme); } catch {}
  }, [theme]);
  const toggle = () => setTheme(t => t === "dark" ? "light" : "dark");
  return [theme, toggle];
}

  const activePartnerships = data.partnerships.filter(p => p.stage === "ACTIVE").length;
  const recentP = [...data.partnerships].sort((a,b)=>new Date(b.updatedAt)-new Date(a.updatedAt)).slice(0,5);
  const partnerById = Object.fromEntries(data.partners.map(p=>[p.id,p]));
  const recent = [...data.activities].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  const userById = Object.fromEntries(data.users.map(u=>[u.id,u]));

  // Chart data
  const hubsByRegion = REGIONS.map(r => ({ label: r.split(" ")[0], value: data.hubs.filter(h=>h.region===r).length }));
  const fundingByStatus = FUNDING_STATUS.map((s,i) => ({ label: s, value: data.fundingSources.filter(f=>f.status===s).reduce((sum,f)=>sum+f.amount,0), color: ["#eab308","#3b82f6","#3d9462","#a855f7"][i] }));
  const stageData = PARTNERSHIP_STAGES.map((s,i) => ({ label: s, value: data.partnerships.filter(p=>p.stage===s).length, color: ["#94a3b8","#3b82f6","#eab308","#3d9462","#6b7280"][i] }));

  // Activity over last 7 days
  const days = Array.from({length: 7}, (_, i) => {
    const d = new Date(); d.setDate(d.getDate() - (6 - i)); d.setHours(0,0,0,0);
    return d.getTime();
  });
  const activitySpark = days.map((day, i) => {
    const next = i < days.length-1 ? days[i+1] : day + 86400000;
    return data.activities.filter(a => { const t = new Date(a.createdAt).getTime(); return t >= day && t < next; }).length;
  });
  const hubsTrend = [data.hubs.length-3, data.hubs.length-2, data.hubs.length-2, data.hubs.length-1, data.hubs.length-1, data.hubs.length, data.hubs.length].map(v=>Math.max(0,v));
  const fundingTrend = [totalFunding*0.6, totalFunding*0.7, totalFunding*0.75, totalFunding*0.85, totalFunding*0.9, totalFunding*0.95, totalFunding].map(v=>Math.round(v/1000));

  return (
    <div>
      <PageHeader
        title="Ecosystem overview"
        subtitle="A live snapshot of partnerships, programs, funding and member activity."
        action={<div className="header-actions">
          <a href="#/intelligence" className="btn-soft"><Icon.intel className="h-4 w-4"/> Intelligence</a>
          <a href="#/africonnect" className="btn-soft-accent"><Icon.africonnect className="h-4 w-4"/> Africonnect</a>
        </div>}
      />
      <QuickActions items={[
        { icon: Icon.plus,        title: "Onboard a hub",     desc: "Add a new member to the ecosystem", href: "#/members" },
        { icon: Icon.partnerships,title: "New partnership",   desc: "Log a new partner deal in the pipeline", href: "#/partnerships" },
        { icon: Icon.send,        title: "Send a campaign",   desc: "Targeted message to paid / region / tier", href: "#/campaigns" },
        { icon: Icon.refresh,     title: "Sync to Africonnect", desc: "Push profiles to the network", href: "#/africonnect" },
      ]} />
      <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-4">
        <StatCard icon={Icon.hubs}         href="#/members"      label="Member hubs"       value={fmtNum(data.hubs.length)} hint={`${paidHubs} paid · ${data.hubs.length-paidHubs} other`} accent="green" trend={5} sparkline={hubsTrend} />
        <StatCard icon={Icon.programs}     href="#/programs"     label="Active programs"   value={data.programs.filter(p=>p.status==="ACTIVE").length} hint={`${data.programs.length} total`} accent="orange" trend={0} sparkline={[3,4,4,5,5,5,5]} />
        <StatCard icon={Icon.funding}      href="#/funding"      label="Total funding"     value={fmtCurrency(totalFunding)} hint="Pledged → disbursed" accent="blue" trend={12} sparkline={fundingTrend} />
        <StatCard icon={Icon.partnerships} href="#/partnerships" label="Live partnerships" value={activePartnerships} hint={`${data.partnerships.length} pipeline`} accent="purple" trend={3} sparkline={[1,1,2,2,2,2,2]} />
      </div>

      {/* CHARTS ROW */}
      <div className="mt-6 grid gap-6 lg:grid-cols-3">
        <div className="card lg:col-span-2 animate-fade-up">
          <div className="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-white/5 dark:border-white/5">
            <div><h3 className="text-base font-bold">Hubs by region</h3><p className="text-sm text-gray-500 dark:text-gray-400">Pan-African coverage</p></div>
            <span className="rounded-full bg-brand-50 px-2.5 py-1 text-[10px] font-bold uppercase tracking-wider text-brand-700 dark:bg-brand-500/10 dark:text-brand-300">{data.hubs.length} hubs</span>
          </div>
          <div className="p-5 text-gray-700 dark:text-gray-300"><BarChart data={hubsByRegion} height={200} /></div>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-white/5 dark:border-white/5">
            <div><h3 className="text-base font-bold">Pipeline distribution</h3><p className="text-sm text-gray-500 dark:text-gray-400">Partnerships by stage</p></div>
          </div>
          <div className="p-5"><DonutChart data={stageData} size={170} thickness={22} /></div>
        </div>
      </div>

      <div className="mt-6 grid gap-6 lg:grid-cols-3">
        <div className="card lg:col-span-2 animate-fade-up">
          <div className="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-white/5 dark:border-white/5">
            <div><h3 className="text-base font-bold">Recent partnerships</h3><p className="text-sm text-gray-500 dark:text-gray-400">Latest pipeline activity</p></div>
            <a href="#/partnerships" className="text-sm font-semibold text-brand-700 dark:text-brand-400 hover:underline">View all →</a>
          </div>
          <table className="table-base">
            <thead><tr><th>Partner</th><th>Title</th><th>Stage</th><th>Value</th></tr></thead>
            <tbody>
              {recentP.map(p => (
                <tr key={p.id}>
                  <td className="font-semibold">{partnerById[p.partnerId]?.name ?? "—"}</td>
                  <td>{p.title}</td>
                  <td><StageBadge stage={p.stage}/></td>
                  <td className="font-mono text-xs">{p.value ? fmtCurrency(p.value, p.currency) : "—"}</td>
                </tr>
              ))}
              {recentP.length === 0 && <tr><td colSpan="4" className="py-6 text-center text-gray-500">No partnerships yet.</td></tr>}
            </tbody>
          </table>
        </div>

        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-white/5 dark:border-white/5">
            <div><h3 className="text-base font-bold">Activity feed</h3><p className="text-sm text-gray-500 dark:text-gray-400">Last 7 days · {activitySpark.reduce((s,n)=>s+n,0)} events</p></div>
            <span className="live-dot"></span>
          </div>
          <div className="border-b border-gray-100 px-5 py-3 dark:border-white/5"><SparkLine data={activitySpark.length ? activitySpark : [0,0,0,0,0,0,1]} color="#3d9462" height={36} width={260} /></div>
          <div className="space-y-4 p-5 max-h-72 overflow-y-auto">
            {recent.map((a,i) => (
              <div key={a.id} className="flex gap-3 animate-slide-in-right" style={{animationDelay:`${i*0.05}s`}}>
                <div className="grid h-8 w-8 shrink-0 place-items-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-xs font-bold text-white">{(userById[a.userId]?.name ?? "S").slice(0,1)}</div>
                <div className="min-w-0 flex-1">
                  <p className="text-sm font-semibold">{a.title}</p>
                  {a.body && <p className="line-clamp-2 text-xs text-gray-500 dark:text-gray-400">{a.body}</p>}
                  <p className="mt-0.5 text-[11px] text-gray-400">{relTime(a.createdAt)} · {(a.type||"").replace(/_/g," ").toLowerCase()}</p>
                </div>
              </div>
            ))}
            {recent.length === 0 && <p className="text-sm text-gray-500">No activity yet.</p>}
          </div>
        </div>
      </div>

      {/* FUNDING STATUS DONUT + UPCOMING EVENTS */}
      <div className="mt-6 grid gap-6 lg:grid-cols-2">
        <div className="card animate-fade-up">
          <div className="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-white/5 dark:border-white/5">
            <div><h3 className="text-base font-bold">Funding flow</h3><p className="text-sm text-gray-500 dark:text-gray-400">Pledged → Disbursed</p></div>
            <a href="#/funding" className="text-sm font-semibold text-brand-700 dark:text-brand-400 hover:underline">Ledger →</a>
          </div>
          <div className="p-5"><DonutChart data={fundingByStatus.filter(d=>d.value>0)} size={180} thickness={22} /></div>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="flex items-center justify-between border-b border-gray-100 px-5 py-4 dark:border-white/5 dark:border-white/5">
            <div><h3 className="text-base font-bold">Upcoming events</h3><p className="text-sm text-gray-500 dark:text-gray-400">Next on the calendar</p></div>
            <a href="#/events" className="text-sm font-semibold text-brand-700 dark:text-brand-400 hover:underline">All →</a>
          </div>
          <table className="table-base">
            <thead><tr><th>Event</th><th>Status</th><th>Date</th></tr></thead>
            <tbody>{[...data.events].sort((a,b)=>new Date(a.startDate)-new Date(b.startDate)).slice(0,5).map(e => (<tr key={e.id}><td className="font-semibold">{e.name}<div className="text-xs text-gray-500">{e.city ? `${e.city}, ${e.country}` : e.location ?? e.country ?? "—"}</div></td><td><StageBadge stage={e.status}/></td><td className="text-xs text-gray-500">{fmtDate(e.startDate)}</td></tr>))}</tbody>
          </table>
        </div>
      </div>
    </div>
  );
}

function CRMHome({ data, update, search, route }) {
  // Sub-route: /crm, /crm/contacts, /crm/deals, /crm/activities, /crm/reports
  const sub = route.replace("/crm", "").replace(/^\//, "") || "overview";

  const tabs = [
    { id:"overview",   label:"Overview",   icon: Icon.dashboard },
    { id:"contacts",   label:"Contacts",   icon: Icon.contacts },
    { id:"deals",      label:"Deals",      icon: Icon.deals },
    { id:"activities", label:"Activities", icon: Icon.activity },
    { id:"reports",    label:"Reports",    icon: Icon.trending },
  ];

  const tabContent = sub === "contacts" ? <ContactsList data={data} update={update} search={search} />
    : sub === "deals" ? <DealsKanban data={data} update={update} />
    : sub === "activities" ? <CRMActivities data={data} update={update} />
    : sub === "reports" ? <CRMReports data={data} />
    : <CRMOverview data={data} />;

  return (
    <div>
      <PageHeader
        title="CRM"
        subtitle="Customer relationship management — contacts, deals, activities, reporting."
      />
      <div className="mb-5 flex flex-wrap gap-1 border-b border-gray-200 dark:border-white/5">
        {tabs.map(t => {
          const active = sub === t.id || (t.id === "overview" && (sub === "" || sub === "overview"));
          const I = t.icon;
          return (
            <a key={t.id} href={t.id === "overview" ? "#/crm" : `#/crm/${t.id}`}
               className={cls("flex items-center gap-2 border-b-2 px-3 py-2 text-[13px] transition -mb-px",
                 active ? "border-brand-600 text-brand-700 dark:text-brand-300 font-semibold" : "border-transparent text-gray-500 hover:text-gray-900 dark:hover:text-gray-100")}>
              <I className="h-4 w-4"/> {t.label}
            </a>
          );
        })}
      </div>
      {tabContent}
    </div>
  );
}

function CRMOverview({ data }) {
  const winRate = (() => {
    const closed = data.deals.filter(d => d.stage === "WON" || d.stage === "LOST");
    if (!closed.length) return 0;
    return Math.round(closed.filter(d=>d.stage==="WON").length / closed.length * 100);
  })();
  const pipelineValue = data.deals.filter(d=>d.stage!=="WON" && d.stage!=="LOST").reduce((s,d)=>s+d.value, 0);
  const wonValue = data.deals.filter(d=>d.stage==="WON").reduce((s,d)=>s+d.value, 0);
  const stageData = DEAL_STAGES.map((s,i) => ({label:s, value: data.deals.filter(d=>d.stage===s).length, color: ["#94a3b8","#3b82f6","#a855f7","#eab308","#3d9462","#ef4444"][i]}));
  const lifecycleData = CONTACT_LIFECYCLE.map((s,i) => ({label:s, value: data.contacts.filter(c=>c.lifecycle===s).length, color: ["#94a3b8","#3b82f6","#fb7d12","#3d9462","#ef4444"][i]}));
  const recentActivities = [...data.crmActivities].sort((a,b)=>new Date(b.completedAt||b.dueDate||0)-new Date(a.completedAt||a.dueDate||0)).slice(0,6);
  const contactById = Object.fromEntries(data.contacts.map(c=>[c.id,c]));
  const dealById = Object.fromEntries(data.deals.map(d=>[d.id,d]));

  return (
    <div>
      <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-4">
        <StatCard icon={Icon.deals}    label="Pipeline value" value={fmtCurrency(pipelineValue)} hint={`${data.deals.filter(d=>d.stage!=="WON"&&d.stage!=="LOST").length} open deals`} accent="blue" trend={8} sparkline={[2,3,3,4,4,5,5]} />
        <StatCard icon={Icon.trending} label="Closed-won YTD" value={fmtCurrency(wonValue)} hint={`${data.deals.filter(d=>d.stage==="WON").length} deals`} accent="green" trend={15} sparkline={[1,1,2,2,3,3,4]} />
        <StatCard icon={Icon.star}     label="Win rate" value={winRate + "%"} hint="Won / closed" accent="orange" trend={2} />
        <StatCard icon={Icon.contacts} label="Active contacts" value={data.contacts.length} hint={`${data.contacts.filter(c=>c.lifecycle==="CUSTOMER").length} customers`} accent="purple" sparkline={[5,6,6,7,7,8,8]} />
      </div>

      <div className="mt-5 grid gap-5 lg:grid-cols-3">
        <div className="card lg:col-span-2 animate-fade-up">
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Deal pipeline by stage</h3><p className="text-[11px] text-gray-500">Live count per stage</p></div>
          <div className="p-4 text-gray-700 dark:text-gray-300"><BarChart data={stageData.map(s => ({label: s.label, value: s.value, color: s.color}))} height={180} /></div>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Contact lifecycle</h3><p className="text-[11px] text-gray-500">Lead → Customer</p></div>
          <div className="p-4"><DonutChart data={lifecycleData.filter(d=>d.value>0)} size={160} thickness={20} /></div>
        </div>
      </div>

      <div className="mt-5 grid gap-5 lg:grid-cols-2">
        <div className="card animate-fade-up">
          <div className="flex items-center justify-between border-b border-gray-100 px-4 py-3 dark:border-white/5">
            <h3 className="text-[14px] font-bold">Top deals</h3>
            <a href="#/crm/deals" className="text-[12px] font-semibold text-brand-700 dark:text-brand-400 hover:underline">Kanban →</a>
          </div>
          <table className="table-base">
            <thead><tr><th>Title</th><th>Stage</th><th>Value</th><th>Close</th></tr></thead>
            <tbody>
              {[...data.deals].sort((a,b)=>b.value-a.value).slice(0,5).map(d => (
                <tr key={d.id}>
                  <td><div className="font-semibold text-[13px]">{d.title}</div><div className="text-[11px] text-gray-500">{contactById[d.contactId]?.firstName} {contactById[d.contactId]?.lastName}</div></td>
                  <td><StageBadge stage={d.stage}/></td>
                  <td className="font-mono text-[12px]">{fmtCurrency(d.value)}</td>
                  <td className="text-[11px] text-gray-500">{fmtDate(d.expectedCloseDate)}</td>
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="flex items-center justify-between border-b border-gray-100 px-4 py-3 dark:border-white/5">
            <h3 className="text-[14px] font-bold">Recent activities</h3>
            <a href="#/crm/activities" className="text-[12px] font-semibold text-brand-700 dark:text-brand-400 hover:underline">All →</a>
          </div>
          <div className="space-y-3 p-4">
            {recentActivities.map(a => {
              const c = contactById[a.contactId];
              return (
                <div key={a.id} className="flex items-start gap-2.5">
                  <div className={cls("grid h-7 w-7 shrink-0 place-items-center rounded-full text-[10px] font-bold",
                    a.type === "CALL" ? "bg-blue-100 text-blue-700" : a.type === "MEETING" ? "bg-purple-100 text-purple-700" : a.type === "EMAIL" ? "bg-brand-100 text-brand-700" : "bg-gray-100 text-gray-700")}>
                    {a.type[0]}
                  </div>
                  <div className="min-w-0 flex-1">
                    <p className="text-[13px] font-medium">{a.title}</p>
                    {c && <p className="text-[11px] text-gray-500">{c.firstName} {c.lastName} · {c.company}</p>}
                    <p className="text-[10px] text-gray-400">{relTime(a.completedAt || a.dueDate)}</p>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      </div>
    </div>
  );
}

function ContactsList({ data, update, search }) {
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [filterLC, setFilterLC] = useState("");
  const partnerById = Object.fromEntries(data.partners.map(p=>[p.id,p]));

  const filtered = data.contacts.filter(c => {
    if (filterLC && c.lifecycle !== filterLC) return false;
    if (search) { const s=search.toLowerCase(); if (!(c.firstName + " " + c.lastName + " " + c.company + " " + c.email).toLowerCase().includes(s)) return false; }
    return true;
  });

  const save = (form) => {
    update(d => {
      if (editing) {
        const idx = d.contacts.findIndex(c => c.id === editing.id);
        d.contacts[idx] = { ...d.contacts[idx], ...form, leadScore: Number(form.leadScore) || 0 };
        logAudit(d, "UPDATE", "Contact", editing.id);
      } else {
        const id = uid();
        d.contacts.push({ id, ...form, leadScore: Number(form.leadScore)||50, tags: form.tags ? form.tags.split(",").map(t=>t.trim()).filter(Boolean) : [], createdAt: new Date().toISOString() });
        logActivity(d, "CONTACT_CREATED", `Contact: ${form.firstName} ${form.lastName}`, form.company);
        logAudit(d, "CREATE", "Contact", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const remove = (c) => {
    if (!confirm(`Delete ${c.firstName} ${c.lastName}?`)) return;
    update(d => { d.contacts = d.contacts.filter(x=>x.id!==c.id); logAudit(d,"DELETE","Contact",c.id); return d; });
    setViewing(null);
  };

  return (
    <div>
      <div className="mb-4 flex flex-wrap items-center justify-between gap-2">
        <div className="flex flex-wrap gap-1.5">
          <button onClick={()=>setFilterLC("")} className={cls("rounded-md border px-2.5 py-1 text-[11px] font-medium", !filterLC ? "border-brand-300 bg-brand-50 text-brand-700 dark:border-brand-700 dark:bg-brand-500/10 dark:text-brand-300" : "border-gray-200 bg-white text-gray-700 hover:bg-gray-50 dark:border-white/10 dark:bg-gray-800 dark:text-gray-300")}>All ({data.contacts.length})</button>
          {CONTACT_LIFECYCLE.map(s => <button key={s} onClick={()=>setFilterLC(s)} className={cls("rounded-md border px-2.5 py-1 text-[11px] font-medium", filterLC===s ? "border-brand-300 bg-brand-50 text-brand-700 dark:border-brand-700 dark:bg-brand-500/10 dark:text-brand-300" : "border-gray-200 bg-white text-gray-700 hover:bg-gray-50 dark:border-white/10 dark:bg-gray-800 dark:text-gray-300")}>{s} ({data.contacts.filter(c=>c.lifecycle===s).length})</button>)}
        </div>
        <button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> New contact</button>
      </div>

      <div className="card">
        <table className="table-base">
          <thead><tr><th>Contact</th><th>Company</th><th>Lifecycle</th><th>Lead score</th><th>Last contact</th><th>Tags</th><th></th></tr></thead>
          <tbody>
            {filtered.map(c => (
              <tr key={c.id}>
                <td>
                  <div className="flex items-center gap-2.5">
                    <div className="grid h-7 w-7 place-items-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-[11px] font-bold text-white">{c.firstName[0]}{c.lastName[0]}</div>
                    <div><div className="font-semibold text-[13px]">{c.firstName} {c.lastName}</div><div className="text-[11px] text-gray-500">{c.title}</div></div>
                  </div>
                </td>
                <td className="text-[13px]">{c.company}</td>
                <td><StageBadge stage={c.lifecycle}/></td>
                <td><div className="flex items-center gap-2"><div className="h-1.5 w-16 overflow-hidden rounded-full bg-gray-200 dark:bg-white/5"><div className={cls("h-full rounded-full", c.leadScore >= 80 ? "bg-brand-500" : c.leadScore >= 50 ? "bg-accent-500" : "bg-gray-400")} style={{width: c.leadScore + "%"}}/></div><span className="text-[11px] font-semibold">{c.leadScore}</span></div></td>
                <td className="text-[11px] text-gray-500">{relTime(c.lastContactedAt)}</td>
                <td><div className="flex flex-wrap gap-1">{(c.tags||[]).slice(0,2).map(t => <span key={t} className="rounded-md bg-gray-100 px-1.5 py-0.5 text-[10px] font-medium text-gray-700 dark:bg-white/[0.06] dark:text-gray-300">{t}</span>)}</div></td>
                <td className="text-right"><button onClick={()=>setViewing(c)} title="Open" className="action-icon"><Icon.eye className="h-3.5 w-3.5"/></button></td>
              </tr>
            ))}
            {filtered.length === 0 && <tr><td colSpan="7" className="py-8 text-center text-gray-500 text-[13px]">No contacts match.</td></tr>}
          </tbody>
        </table>
      </div>

      <Modal open={creating || !!editing || !!viewing} onClose={()=>{setCreating(false); setEditing(null); setViewing(null);}}
             title={creating ? "New contact" : editing ? "Edit contact" : viewing ? `${viewing.firstName} ${viewing.lastName}` : ""} size="lg">
        {(creating || editing) ? (
          <ContactForm initial={editing} partners={data.partners} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} />
        ) : viewing ? (

function DealsKanban({ data, update }) {
  const [creating, setCreating] = useState(false);
  const [editing, setEditing] = useState(null);
  const [draggingId, setDraggingId] = useState(null);
  const contactById = Object.fromEntries(data.contacts.map(c=>[c.id,c]));

  const moveDeal = (dealId, stage) => {
    update(d => {
      const idx = d.deals.findIndex(x => x.id === dealId);
      if (idx < 0) return d;
      const old = d.deals[idx].stage;
      d.deals[idx].stage = stage;
      d.deals[idx].updatedAt = new Date().toISOString();
      if (stage === "WON" || stage === "LOST") d.deals[idx].closedAt = new Date().toISOString();
      logActivity(d, "DEAL_MOVED", `${d.deals[idx].title}: ${old} → ${stage}`, null);
      logAudit(d, "UPDATE", "Deal", dealId);
      return d;
    });
  };

  const save = (form) => {
    update(d => {
      const payload = { ...form, value: Number(form.value)||0, probability: Number(form.probability)||50 };
      if (editing) {
        const idx = d.deals.findIndex(x => x.id === editing.id);
        d.deals[idx] = { ...d.deals[idx], ...payload, updatedAt: new Date().toISOString() };
        logAudit(d, "UPDATE", "Deal", editing.id);
      } else {
        const id = uid();
        d.deals.push({ id, ...payload, createdAt: new Date().toISOString(), updatedAt: new Date().toISOString() });
        logActivity(d, "DEAL_CREATED", `New deal: ${form.title}`, fmtCurrency(payload.value));
        logAudit(d, "CREATE", "Deal", id);
      }
      return d;
    });
    setCreating(false); setEditing(null);
  };
  const remove = (deal) => {
    if (!confirm("Delete deal?")) return;
    update(d => { d.deals = d.deals.filter(x=>x.id!==deal.id); logAudit(d,"DELETE","Deal",deal.id); return d; });
    setEditing(null);
  };

  return (
    <div>
      <div className="mb-4 flex items-center justify-between">
        <div className="text-[12px] text-gray-500">{data.deals.length} deals · pipeline {fmtCurrency(data.deals.filter(d=>d.stage!=="WON"&&d.stage!=="LOST").reduce((s,d)=>s+d.value,0))}</div>
        <button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> New deal</button>
      </div>
      <div className="grid grid-cols-2 gap-3 md:grid-cols-3 xl:grid-cols-6">
        {DEAL_STAGES.map((stage, i) => {
          const deals = data.deals.filter(d => d.stage === stage);
          const total = deals.reduce((s,d)=>s+d.value, 0);
          const colors = ["#94a3b8","#3b82f6","#a855f7","#eab308","#3d9462","#ef4444"];
          return (
            <div key={stage} className="rounded-xl border border-gray-200 bg-gray-50 dark:border-white/5 dark:bg-white/5"
                 onDragOver={(e)=>e.preventDefault()}
                 onDrop={(e)=>{ if (draggingId) moveDeal(draggingId, stage); setDraggingId(null); }}>
              <div className="border-b border-gray-200 px-3 py-2 dark:border-white/5">
                <div className="flex items-center justify-between">
                  <span className="flex items-center gap-1.5 text-[12px] font-bold"><span className="h-2 w-2 rounded-full" style={{background:colors[i]}}/>{stage}</span>
                  <span className="rounded-full bg-white px-1.5 py-0.5 text-[10px] font-semibold text-gray-700 dark:bg-gray-800 dark:text-gray-300">{deals.length}</span>
                </div>
                <p className="mt-0.5 font-mono text-[10px] text-gray-500">{fmtCurrency(total)}</p>
              </div>
              <div className="space-y-2 p-2 min-h-32">
                {deals.map(d => {
                  const c = contactById[d.contactId];
                  return (
                    <div key={d.id} draggable
                         onDragStart={()=>setDraggingId(d.id)}
                         onClick={()=>setEditing(d)}
                         className="group cursor-pointer rounded-lg border border-gray-200 bg-white p-2.5 shadow-sm hover:shadow-md hover:border-brand-300 transition dark:border-white/10 dark:bg-gray-800 dark:hover:border-brand-500">
                      <p className="line-clamp-2 text-[12px] font-semibold">{d.title}</p>
                      <div className="mt-1.5 flex items-center justify-between">
                        <span className="font-mono text-[11px] font-bold text-brand-700 dark:text-brand-400">{fmtCurrency(d.value)}</span>
                        <span className="text-[10px] text-gray-500">{d.probability}%</span>
                      </div>
                      {c && <div className="mt-1 flex items-center gap-1.5">
                        <div className="grid h-4 w-4 place-items-center rounded-full bg-gradient-to-br from-brand-400 to-brand-600 text-[8px] font-bold text-white">{c.firstName[0]}</div>
                        <span className="text-[10px] text-gray-500 truncate">{c.firstName} {c.lastName}</span>
                      </div>}
                    </div>
                  );
                })}
                {deals.length === 0 && <p className="py-2 text-center text-[10px] text-gray-400">Drop here</p>}
              </div>
            </div>
          );
        })}
      </div>
      <Modal open={creating || !!editing} onClose={()=>{setCreating(false); setEditing(null);}} title={creating ? "New deal" : "Edit deal"} size="md">
        <DealForm initial={editing} contacts={data.contacts} partners={data.partners} onSave={save} onCancel={()=>{setCreating(false); setEditing(null);}} onDelete={editing?()=>remove(editing):null} />
      </Modal>
    </div>
  );
}

function CRMActivities({ data, update }) {
  const [creating, setCreating] = useState(false);
  const [filter, setFilter] = useState("");
  const contactById = Object.fromEntries(data.contacts.map(c=>[c.id,c]));
  const sorted = [...data.crmActivities].filter(a => !filter || a.type === filter).sort((a,b)=>new Date(b.completedAt||b.dueDate||0)-new Date(a.completedAt||a.dueDate||0));
  const counts = ACTIVITY_TYPES.reduce((acc,t)=>({...acc,[t]:data.crmActivities.filter(x=>x.type===t).length}),{});

  const save = (form) => {
    update(d => {
      const id = uid();
      d.crmActivities.unshift({ id, ...form, owner: d.settings.currentUserId,
        completedAt: form.completed ? new Date().toISOString() : null,
        dueDate: form.dueDate || null });
      const c = d.contacts.find(c => c.id === form.contactId);
      if (c) c.lastContactedAt = new Date().toISOString();
      logAudit(d, "CREATE", "CRMActivity", id);
      return d;
    });
    setCreating(false);
  };

  return (
    <div>
      <div className="mb-4 flex items-center justify-between">
        <div className="flex flex-wrap gap-1.5">
          <button onClick={()=>setFilter("")} className={cls("rounded-md border px-2.5 py-1 text-[11px] font-medium", !filter ? "border-brand-300 bg-brand-50 text-brand-700 dark:border-brand-700 dark:bg-brand-500/10 dark:text-brand-300" : "border-gray-200 bg-white text-gray-700 hover:bg-gray-50 dark:border-white/10 dark:bg-gray-800 dark:text-gray-300")}>All</button>
          {ACTIVITY_TYPES.map(t => <button key={t} onClick={()=>setFilter(t)} className={cls("rounded-md border px-2.5 py-1 text-[11px] font-medium", filter===t ? "border-brand-300 bg-brand-50 text-brand-700 dark:border-brand-700 dark:bg-brand-500/10 dark:text-brand-300" : "border-gray-200 bg-white text-gray-700 hover:bg-gray-50 dark:border-white/10 dark:bg-gray-800 dark:text-gray-300")}>{t} ({counts[t]||0})</button>)}
        </div>
        <button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> Log activity</button>
      </div>

      <div className="card">
        <div className="space-y-3 p-4">
          {sorted.map(a => {
            const c = contactById[a.contactId];
            const tone = a.type === "CALL" ? "blue" : a.type === "MEETING" ? "purple" : a.type === "EMAIL" ? "green" : a.type === "NOTE" ? "gray" : "orange";
            return (
              <div key={a.id} className="flex items-start gap-3 rounded-lg border border-gray-100 p-3 dark:border-white/5">
                <Badge tone={tone}>{a.type}</Badge>
                <div className="flex-1 min-w-0">
                  <p className="text-[13px] font-semibold">{a.title}</p>
                  {c && <p className="text-[11px] text-gray-500">{c.firstName} {c.lastName} · {c.company}</p>}
                  {a.note && <p className="mt-1 text-[12px] text-gray-600 dark:text-gray-400">{a.note}</p>}
                  <p className="mt-1 text-[10px] text-gray-400">{a.completedAt ? "Completed " : "Due "}{relTime(a.completedAt || a.dueDate)}{a.durationMin ? ` · ${a.durationMin}min` : ""}</p>
                </div>
              </div>
            );
          })}
          {sorted.length === 0 && <p className="py-4 text-center text-[12px] text-gray-500">No activities logged.</p>}
        </div>
      </div>

      <Modal open={creating} onClose={()=>setCreating(false)} title="Log activity" size="md">
        <ActivityForm contacts={data.contacts} deals={data.deals} onSave={save} onCancel={()=>setCreating(false)} />
      </Modal>
    </div>
  );
}

function CRMReports({ data }) {
  const ownerStats = {};
  data.deals.forEach(d => {
    const u = data.users.find(u => u.id === d.owner);
    const name = u?.name ?? "Unassigned";
    if (!ownerStats[name]) ownerStats[name] = { open:0, won:0, value:0, wonValue:0 };
    if (d.stage === "WON") { ownerStats[name].won++; ownerStats[name].wonValue += d.value; }
    else if (d.stage !== "LOST") { ownerStats[name].open++; ownerStats[name].value += d.value; }
  });
  const sourceData = ["INBOUND","OUTBOUND","REFERRAL","EVENT"].map((s,i)=>({label:s, value:data.deals.filter(d=>d.source===s).length, color:["#3d9462","#3b82f6","#a855f7","#fb7d12"][i]})).filter(d=>d.value>0);
  const monthlyTrend = Array.from({length:6}, (_,i) => {
    const d = new Date(); d.setMonth(d.getMonth() - (5-i)); d.setDate(1);
    const start = d.getTime();
    const end = new Date(d); end.setMonth(end.getMonth()+1);
    return data.deals.filter(x => { const t = new Date(x.createdAt).getTime(); return t >= start && t < end.getTime(); }).length;
  });

  return (
    <div className="grid gap-5 lg:grid-cols-2">
      <div className="card">
        <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Deals by source</h3></div>
        <div className="p-4"><DonutChart data={sourceData} size={180} thickness={22}/></div>
      </div>
      <div className="card">
        <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">New deals over time</h3><p className="text-[11px] text-gray-500">Last 6 months</p></div>
        <div className="p-4 text-gray-700 dark:text-gray-300"><BarChart data={monthlyTrend.map((v,i)=>{const d=new Date(); d.setMonth(d.getMonth()-(5-i)); return {label:d.toLocaleDateString("en",{month:"short"}), value:v}})} height={180}/></div>
      </div>
      <div className="card lg:col-span-2">
        <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Owner leaderboard</h3></div>
        <table className="table-base">
          <thead><tr><th>Owner</th><th>Open deals</th><th>Open value</th><th>Won deals</th><th>Won value</th></tr></thead>
          <tbody>{Object.entries(ownerStats).sort((a,b)=>b[1].wonValue-a[1].wonValue).map(([name, s])=>(
            <tr key={name}><td className="font-semibold text-[13px]">{name}</td><td>{s.open}</td><td className="font-mono text-[12px]">{fmtCurrency(s.value)}</td><td>{s.won}</td><td className="font-mono text-[12px] text-brand-700 dark:text-brand-400">{fmtCurrency(s.wonValue)}</td></tr>
          ))}</tbody>
        </table>
      </div>
    </div>
  );
}

function HubsList({ data, update, search }) {
  const [tab, setTab] = useState("all"); // all, paid, pending, expired, renewals
  const [filterRegion, setFilterRegion] = useState("");
  const [filterTier, setFilterTier] = useState("");
  const [filterStatus, setFilterStatus] = useState("");
  const [editing, setEditing] = useState(null);
  const [creating, setCreating] = useState(false);
  const [paymentFor, setPaymentFor] = useState(null);
  const [viewing, setViewing] = useState(null);
  const [messaging, setMessaging] = useState(null); // {audience, count}
  const [reminderModal, setReminderModal] = useState(null); // hub for reminder

  // Compute renewal info for each hub
  const renewalInfo = (hub) => {
    const last = data.payments.filter(p => p.hubId === hub.id && p.status === "PAID").sort((a,b)=>new Date(b.periodEnd)-new Date(a.periodEnd))[0];
    if (!last) return { status: "no-payment", days: null, lastPaid: null };
    const days = Math.floor((new Date(last.periodEnd).getTime() - Date.now()) / 86400000);
    if (days < 0) return { status: "expired", days, lastPaid: last };
    if (days <= 30) return { status: "renewal-soon", days, lastPaid: last };
    if (days <= 60) return { status: "renewal-upcoming", days, lastPaid: last };
    return { status: "current", days, lastPaid: last };
  };
  const isPriorityHub = (h) => h.membershipTier === "STRATEGIC" || (h.membershipTier === "PREMIUM" && hubPaymentStatus(h, data.payments) === "paid");

  // Apply tab filter first
  let tabFiltered = data.hubs;
  if (tab === "paid")     tabFiltered = data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "paid");
  if (tab === "pending")  tabFiltered = data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "pending");
  if (tab === "expired")  tabFiltered = data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "expired");
  if (tab === "renewals") tabFiltered = data.hubs.filter(h => { const r = renewalInfo(h); return r.status === "renewal-soon" || r.status === "renewal-upcoming"; });

  const filtered = tabFiltered.filter(h => {
    if (filterRegion && h.region !== filterRegion) return false;
    if (filterTier && h.membershipTier !== filterTier) return false;
    if (filterStatus && h.status !== filterStatus) return false;
    if (search && !(h.name + h.country + (h.sector||"")).toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const paid    = data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "paid").length;
  const pending = data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "pending").length;
  const expired = data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "expired").length;
  const renewalsSoon = data.hubs.filter(h => { const r = renewalInfo(h); return r.status === "renewal-soon"; }).length;

  // Auto-reminders panel: who needs payment reminder, who needs renewal notice
  const remindersList = data.hubs.map(h => {
    const r = renewalInfo(h);
    if (r.status === "renewal-soon") return { hub: h, kind: "renewal", message: `Renewal in ${r.days}d`, severity: "warn" };
    const overdue = data.payments.find(p => p.hubId === h.id && p.status === "OVERDUE");
    if (overdue) return { hub: h, kind: "overdue", message: "Payment overdue", severity: "danger" };
    if (r.status === "expired") return { hub: h, kind: "expired", message: `Expired ${Math.abs(r.days)}d ago`, severity: "danger" };
    return null;
  }).filter(Boolean).slice(0, 8);

  // Priority hubs (auto-tagged: STRATEGIC + paid PREMIUM)
  const priorityHubs = data.hubs.filter(isPriorityHub);

  // Region + tier breakdown for charts
  const hubsByRegion = REGIONS.map(r => ({ label: r.split(" ")[0], value: data.hubs.filter(h=>h.region===r).length }));
  const tierBreakdown = TIERS.map((t,i) => ({ label: t, value: data.hubs.filter(h=>h.membershipTier===t).length, color: ["#94a3b8","#3b82f6","#a855f7"][i] }));
  const subscriptionBreakdown = [
    { label:"Paid",    value: paid,    color:"#3d9462" },
    { label:"Pending", value: pending, color:"#fb7d12" },
    { label:"Expired", value: expired, color:"#ef4444" },
  ].filter(d => d.value > 0);

  // MRR (monthly recurring revenue) calculation
  const mrr = data.hubs.reduce((sum, h) => {
    const ps = data.payments.filter(p => p.hubId === h.id && p.status === "PAID");
    const last = ps.sort((a,b)=>new Date(b.periodEnd)-new Date(a.periodEnd))[0];
    if (!last) return sum;
    const periodMonths = Math.max(1, Math.round((new Date(last.periodEnd) - new Date(last.periodStart)) / (86400000 * 30)));
    return sum + (last.amount / periodMonths);
  }, 0);

  const tabs = [
    { id:"all",      label:"All hubs",       count: data.hubs.length },
    { id:"paid",     label:"Paid",           count: paid },
    { id:"pending",  label:"Pending",        count: pending },
    { id:"expired",  label:"Expired",        count: expired },
    { id:"renewals", label:"Renewals due",   count: renewalsSoon },
  ];

  const sendReminder = (hub, kind) => {
    update(d => {
      logActivity(d, "REMINDER_SENT", `${kind} reminder sent: ${hub.name}`, `Auto-reminder via Member Services`, { hubId: hub.id });
      logAudit(d, "CREATE", "Reminder", hub.id);
      return d;
    });
    alert(`Reminder logged for ${hub.name} (${kind}).`);
  };

  const sendCampaign = (audience) => {
    const hubsInAudience = audience === "PAID_HUBS" ? data.hubs.filter(h => hubPaymentStatus(h, data.payments) === "paid")
      : audience.startsWith("REGION:") ? data.hubs.filter(h => h.region === audience.slice(7))
      : audience.startsWith("TIER:") ? data.hubs.filter(h => h.membershipTier === audience.slice(5))
      : audience === "PRIORITY" ? priorityHubs
      : data.hubs;
    setMessaging({ audience, count: hubsInAudience.length });
  };
  const submitCampaign = (form) => {
    update(d => {
      const id = uid();
      d.campaigns.push({ id, ...form, channel:"EMAIL", recipients: messaging.count, opens:0, clicks:0,
        createdById: d.settings.currentUserId, createdAt: new Date().toISOString(),
        sentAt: form.status === "SENT" ? new Date().toISOString() : null });
      if (form.status === "SENT") logActivity(d, "CAMPAIGN_SENT", `Member campaign sent: ${form.name}`, `${messaging.count} recipients`);
      logAudit(d, "CREATE", "Campaign", id);
      return d;
    });
    setMessaging(null);
    alert("Campaign sent.");
  };

  const saveHub = (form) => {
    update(d => {
      if (editing) {
        const idx = d.hubs.findIndex(h => h.id === editing.id);
        d.hubs[idx] = { ...d.hubs[idx], ...form };
        logActivity(d, "HUB_UPDATED", `Hub updated: ${form.name}`, null, {hubId:editing.id});
        logAudit(d, "UPDATE", "Hub", editing.id);
      } else {
        const id = uid();
        d.hubs.push({ id, ...form, joinedAt: new Date().toISOString(), africonnectId: "AC-" + Math.floor(Math.random()*9000+1000) });
        logActivity(d, "HUB_CREATED", `Hub onboarded: ${form.name}`, `Region: ${form.region}, Tier: ${form.membershipTier}`, {hubId:id});
        logAudit(d, "CREATE", "Hub", id);
      }
      return d;
    });
    setEditing(null); setCreating(false);
  };
  const deleteHub = (h) => {
    if (!confirm(`Delete hub "${h.name}"? This is permanent.`)) return;
    update(d => {
      d.hubs = d.hubs.filter(x => x.id !== h.id);
      d.payments = d.payments.filter(p => p.hubId !== h.id);
      d.programHubs = d.programHubs.filter(p => p.hubId !== h.id);
      logAudit(d, "DELETE", "Hub", h.id);
      return d;
    });
    setViewing(null);
  };
  const recordPayment = (form) => {
    update(d => {
      d.payments.push({ id: uid(), ...form });
      const hub = d.hubs.find(h => h.id === form.hubId);
      logActivity(d, "HUB_PAID", `Payment ${form.status}: ${fmtCurrency(form.amount)}`, hub?.name, {hubId: form.hubId});
      logAudit(d, "CREATE", "HubPayment", form.hubId);
      return d;
    });
    setPaymentFor(null);
  };

  return (
    <div>
      <PageHeader title="Member Services" subtitle="Manage 500+ Afrilabs hubs across the continent — onboarding, payments, segmentation, communications."
        action={<div className="header-actions">
          <button className="btn-soft" onClick={()=>sendCampaign("ALL_HUBS")}><Icon.send className="h-4 w-4"/> Targeted message</button>
          <button className="btn-primary" onClick={()=>setCreating(true)}><Icon.plus className="h-4 w-4"/> Onboard hub</button>
        </div>} />

      {/* TOP STATS */}
      <div className="grid gap-3 md:grid-cols-2 lg:grid-cols-5">
        <StatCard icon={Icon.hubs}    label="Total hubs"  value={data.hubs.length} hint="All members" accent="green"  trend={12} sparkline={[24,26,27,28,29,30,30]} />
        <StatCard icon={Icon.check}   label="Paid"        value={paid}     hint="Active subscriptions" accent="green"  trend={5}  sparkline={[18,19,20,21,21,22,22]} />
        <StatCard icon={Icon.refresh} label="Pending"     value={pending}  hint="Awaiting payment"     accent="orange" />
        <StatCard icon={Icon.alert}   label="Expired"     value={expired}  hint="Need renewal"         accent="red"    trend={-3} />
        <StatCard icon={Icon.funding} label="MRR (est)"   value={fmtCurrency(mrr)} hint="Monthly recurring" accent="purple" trend={8} sparkline={[8,9,9,10,11,11,12]} />
      </div>

      {/* CHARTS ROW */}
      <div className="mt-5 grid gap-4 lg:grid-cols-3">
        <div className="card lg:col-span-2 animate-fade-up">
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5">
            <h3 className="text-[14px] font-bold">Regional distribution</h3>
            <p className="text-[11px] text-gray-500">Hubs across all 5 African regions · live</p>
          </div>
          <div className="p-4 text-gray-700 dark:text-gray-300"><BarChart data={hubsByRegion} height={180} /></div>
        </div>
        <div className="card animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5">
            <h3 className="text-[14px] font-bold">Subscription health</h3>
            <p className="text-[11px] text-gray-500">Paid vs pending vs expired</p>
          </div>
          <div className="p-4"><DonutChart data={subscriptionBreakdown} size={160} thickness={20} /></div>
        </div>
      </div>

      {/* SEGMENTATION SHORTCUTS — targeted communications */}
      <div className="mt-5 card animate-fade-up">
        <div className="flex items-center justify-between border-b border-gray-100 px-4 py-3 dark:border-white/5">
          <div><h3 className="text-[14px] font-bold">Targeted communications</h3><p className="text-[11px] text-gray-500">Send messages to specific segments instantly</p></div>
          <Icon.send className="h-4 w-4 text-gray-400"/>
        </div>
        <div className="grid gap-2 p-4 md:grid-cols-2 lg:grid-cols-4">
          <button onClick={()=>sendCampaign("PAID_HUBS")} className="group flex items-center justify-between rounded-lg border border-gray-200 bg-gradient-to-br from-brand-50 to-white p-3 text-left transition hover:border-brand-300 hover:shadow-md dark:border-white/10 dark:from-brand-900/20 dark:to-gray-800">
            <div><p className="text-[11px] font-bold uppercase tracking-wider text-brand-700 dark:text-brand-300">Paid members</p><p className="text-[18px] font-black mt-0.5">{paid}</p><p className="text-[10px] text-gray-500">Active subscriptions only</p></div>
            <Icon.send className="h-4 w-4 text-brand-600 opacity-0 group-hover:opacity-100 transition"/>
          </button>
          <button onClick={()=>sendCampaign("PRIORITY")} className="group flex items-center justify-between rounded-lg border border-gray-200 bg-gradient-to-br from-purple-50 to-white p-3 text-left transition hover:border-purple-300 hover:shadow-md dark:border-white/10 dark:from-purple-900/20 dark:to-gray-800">
            <div><p className="text-[11px] font-bold uppercase tracking-wider text-purple-700 dark:text-purple-300">Priority hubs</p><p className="text-[18px] font-black mt-0.5">{priorityHubs.length}</p><p className="text-[10px] text-gray-500">Strategic + paid premium</p></div>
            <Icon.star className="h-4 w-4 text-purple-600 opacity-0 group-hover:opacity-100 transition"/>
          </button>
          <button onClick={()=>{ const r = prompt("Region (e.g. West Africa):", "West Africa"); if (r) sendCampaign("REGION:"+r); }} className="group flex items-center justify-between rounded-lg border border-gray-200 bg-gradient-to-br from-blue-50 to-white p-3 text-left transition hover:border-blue-300 hover:shadow-md dark:border-white/10 dark:from-blue-900/20 dark:to-gray-800">
            <div><p className="text-[11px] font-bold uppercase tracking-wider text-blue-700 dark:text-blue-300">By region</p><p className="text-[18px] font-black mt-0.5">{REGIONS.length}</p><p className="text-[10px] text-gray-500">Region-specific outreach</p></div>
            <Icon.layers className="h-4 w-4 text-blue-600 opacity-0 group-hover:opacity-100 transition"/>
          </button>
          <button onClick={()=>{ const s = prompt("Tier (STANDARD / PREMIUM / STRATEGIC):", "PREMIUM"); if (s) sendCampaign("TIER:"+s.toUpperCase()); }} className="group flex items-center justify-between rounded-lg border border-gray-200 bg-gradient-to-br from-accent-50 to-white p-3 text-left transition hover:border-accent-300 hover:shadow-md dark:border-white/10 dark:from-accent-900/20 dark:to-gray-800">
            <div><p className="text-[11px] font-bold uppercase tracking-wider text-accent-700 dark:text-accent-300">By tier</p><p className="text-[18px] font-black mt-0.5">{TIERS.length}</p><p className="text-[10px] text-gray-500">Tier-based outreach</p></div>

      <div className="mt-5 grid gap-4 lg:grid-cols-3">

        <div className="card lg:col-span-2 animate-fade-up" style={{animationDelay:"0.1s"}}>
          <div className="border-b border-gray-100 px-4 py-3 dark:border-white/5"><h3 className="text-[14px] font-bold">Engagement scores</h3><p className="text-[11px] text-gray-500">Top 8 hubs by engagement</p></div>
          <div className="p-4 text-gray-700 dark:text-gray-300"><BarChart data={[...data.hubs].sort((a,b)=>b.engagementScore-a.engagementScore).slice(0,8).map(h=>({label: h.name.slice(0,12), value: h.engagementScore}))} height={180} /></div>
        </div>
      </div>

      {/* HUB LIST WITH TABS */}
      <div className="mt-5 card animate-fade-up">
        <div className="flex flex-wrap gap-1 border-b border-gray-200 px-2 py-1 dark:border-white/5">
          {tabs.map(t => (
            <button key={t.id} onClick={()=>setTab(t.id)}
              className={cls("flex items-center gap-1.5 rounded-md px-3 py-1.5 text-[12px] font-medium transition",
                tab===t.id ? "bg-brand-50 text-brand-700 dark:bg-brand-500/15 dark:text-brand-300" : "text-gray-500 hover:bg-gray-50 dark:hover:bg-white/5")}>
              {t.label} <span className={cls("rounded-full px-1.5 py-0.5 text-[10px] font-bold", tab===t.id ? "bg-brand-600 text-white" : "bg-gray-200 text-gray-700 dark:bg-white/10 dark:text-gray-300")}>{t.count}</span>
            </button>
          ))}
        </div>
        <div className="flex flex-wrap items-center justify-between gap-2 border-b border-gray-100 px-4 py-2.5 dark:border-white/5">
          <span className="text-[12px] text-gray-500">Showing <strong>{filtered.length}</strong> hub{filtered.length===1?"":"s"}</span>
          <div className="flex gap-1.5 text-[11px]">
            <select className="rounded-md border border-gray-300 bg-white px-2 py-1 dark:border-white/10 dark:bg-gray-800" value={filterRegion} onChange={e=>setFilterRegion(e.target.value)}><option value="">All regions</option>{REGIONS.map(r=><option key={r}>{r}</option>)}</select>
            <select className="rounded-md border border-gray-300 bg-white px-2 py-1 dark:border-white/10 dark:bg-gray-800" value={filterTier} onChange={e=>setFilterTier(e.target.value)}><option value="">All tiers</option>{TIERS.map(t=><option key={t}>{t}</option>)}</select>
            <select className="rounded-md border border-gray-300 bg-white px-2 py-1 dark:border-white/10 dark:bg-gray-800" value={filterStatus} onChange={e=>setFilterStatus(e.target.value)}><option value="">Any status</option>{HUB_STATUS.map(s=><option key={s}>{s}</option>)}</select>
          </div>
        </div>
        <table className="table-base">
          <thead><tr><th></th><th>Hub</th><th>Country · Region</th><th>Tier</th><th>Status</th><th>Engage</th><th>Payment</th><th>Renewal</th><th></th></tr></thead>
          <tbody>
            {filtered.map(h => {
              const last = data.payments.filter(p=>p.hubId===h.id).sort((a,b)=>new Date(b.periodEnd)-new Date(a.periodEnd))[0];
              const r = renewalInfo(h);
              return (
                <tr key={h.id}>
                  <td className="!w-6">{isPriorityHub(h) && <Icon.star className="h-3.5 w-3.5 text-purple-500" title="Priority hub"/>}</td>
                  <td><div className="font-semibold text-[13px]">{h.name}</div><div className="text-[11px] text-gray-500">{h.sector ?? "—"}{h.africonnectId ? ` · ${h.africonnectId}` : ""}</div></td>
                  <td className="text-[12px]"><div>{h.country}</div><div className="text-[11px] text-gray-500">{h.region}</div></td>
                  <td><StageBadge stage={h.membershipTier}/></td>
                  <td><StageBadge stage={h.status}/></td>
                  <td><div className="flex items-center gap-1.5"><div className="h-1.5 w-12 overflow-hidden rounded-full bg-gray-200 dark:bg-white/5"><div className={cls("h-full rounded-full", h.engagementScore >= 70 ? "bg-brand-500" : h.engagementScore >= 40 ? "bg-accent-500" : "bg-red-400")} style={{width: h.engagementScore + "%"}}/></div><span className="text-[11px] font-semibold">{h.engagementScore}</span></div></td>
                  <td className="text-[11px]">{last ? <><StageBadge stage={last.status}/> <span className="ml-1 font-mono">{fmtCurrency(last.amount)}</span></> : <span className="text-gray-400">—</span>}</td>
                  <td className="text-[11px]">
                    {r.status === "no-payment" ? <span className="text-gray-400">—</span>
                      : r.status === "expired" ? <span className="text-red-600 dark:text-red-400">Expired {Math.abs(r.days)}d ago</span>
                      : r.status === "renewal-soon" ? <span className="text-accent-700 dark:text-accent-300 font-medium">In {r.days}d</span>
                      : r.status === "renewal-upcoming" ? <span className="text-blue-600 dark:text-blue-400">In {r.days}d</span>
                      : <span className="text-gray-500">{r.days}d</span>}
                  </td>
                  <td className="space-x-2 whitespace-nowrap text-right">
                    <button onClick={()=>setPaymentFor(h)} className="text-[11px] font-semibold text-accent-700 dark:text-accent-400 hover:underline">+Pay</button>
                    <button onClick={()=>setViewing(h)} className="text-[12px] font-semibold text-brand-700 dark:text-brand-400 hover:underline">Open</button>
                  </td>
                </tr>
              );
            })}
            {filtered.length === 0 && <tr><td colSpan="9" className="py-10 text-center text-gray-500 text-[13px]">No hubs match filters.</td></tr>}
          </tbody>
        </table>
      </div>

      <Modal open={!!viewing || creating || !!editing} onClose={()=>{setViewing(null); setCreating(false); setEditing(null);}}
             title={creating ? "Onboard hub" : editing ? "Edit hub" : viewing?.name} size="lg">
        {(creating || editing) ? (
          <HubForm initial={editing} onSave={saveHub} onCancel={()=>{setCreating(false); setEditing(null);}} />
        ) : viewing ? (
          <div className="p-6">
            <div className="grid gap-3 md:grid-cols-3 mb-6">
              <div><p className="text-xs uppercase text-gray-500">Country</p><p className="font-medium">{viewing.city ? `${viewing.city}, ` : ""}{viewing.country}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Region</p><p className="font-medium">{viewing.region}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Sector</p><p className="font-medium">{viewing.sector ?? "—"}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Tier</p><p><StageBadge stage={viewing.membershipTier}/></p></div>
              <div><p className="text-xs uppercase text-gray-500">Status</p><p><StageBadge stage={viewing.status}/></p></div>
              <div><p className="text-xs uppercase text-gray-500">Engagement</p><p className="font-medium">{viewing.engagementScore}/100</p></div>
              <div><p className="text-xs uppercase text-gray-500">Website</p><p className="text-blue-600 text-sm">{viewing.websiteUrl ?? "—"}</p></div>
              <div><p className="text-xs uppercase text-gray-500">Email</p><p className="text-sm">{viewing.email ?? "—"}</p></div>
              <div><p className="text-xs uppercase text-gray-500">AfriconnectID</p><p className="font-mono text-xs">{viewing.africonnectId ?? "—"}</p></div>
            </div>
            <div className="flex items-center justify-between mb-3">
              <h3 className="font-semibold">Payment history</h3>
              <button onClick={()=>setPaymentFor(viewing)} className="btn-primary !py-1.5 text-xs">+ Record payment</button>
            </div>
            <table className="table-base">
              <thead><tr><th>Period</th><th>Amount</th><th>Status</th><th>Paid</th><th>Reference</th></tr></thead>
              <tbody>
                {data.payments.filter(p=>p.hubId===viewing.id).map(p=>(
                  <tr key={p.id}><td>{fmtDate(p.periodStart)} → {fmtDate(p.periodEnd)}</td><td className="font-mono">{fmtCurrency(p.amount)}</td><td><StageBadge stage={p.status}/></td><td>{fmtDate(p.paidAt)}</td><td className="text-xs text-gray-500">{p.reference ?? "—"}</td></tr>
                ))}
                {data.payments.filter(p=>p.hubId===viewing.id).length === 0 && <tr><td colSpan="5" className="py-4 text-center text-gray-500">No payments.</td></tr>}
              </tbody>
            </table>
            <div className="mt-6 flex justify-between border-t border-gray-100 pt-4">
              <button onClick={()=>deleteHub(viewing)} className="btn-danger">Delete hub</button>
              <div className="space-x-2"><button onClick={()=>setViewing(null)} className="btn-ghost">Close</button><button onClick={()=>{setEditing(viewing); setViewing(null);}} className="btn-outline">Edit</button></div>
            </div>
          </div>
        ) : null}
      </Modal>

      <Modal open={!!paymentFor} onClose={()=>setPaymentFor(null)} title={`Record payment — ${paymentFor?.name ?? ""}`} size="md">
        {paymentFor && <PaymentForm hubId={paymentFor.id} onSave={recordPayment} onCancel={()=>setPaymentFor(null)} />}
      </Modal>

      {/* Targeted-messaging modal */}
      <Modal open={!!messaging} onClose={()=>setMessaging(null)} title="Send targeted message" size="md">
        {messaging && <TargetedMessageForm audience={messaging.audience} count={messaging.count} onSave={submitCampaign} onCancel={()=>setMessaging(null)} />}
      </Modal>

      {/* Reminder detail modal */}
      <Modal open={!!reminderModal} onClose={()=>setReminderModal(null)} title={`Reminder details — ${reminderModal?.name ?? ""}`} size="md">
        {reminderModal && (
          <div className="p-5">
            <div className="grid gap-3 md:grid-cols-2 mb-4 text-[13px]">
              <div><p className="text-[10px] uppercase text-gray-500">Region</p><p className="font-medium">{reminderModal.region}</p></div>
              <div><p className="text-[10px] uppercase text-gray-500">Tier</p><p><StageBadge stage={reminderModal.membershipTier}/></p></div>
              <div><p className="text-[10px] uppercase text-gray-500">Email</p><p className="font-medium text-[12px]">{reminderModal.email ?? "—"}</p></div>
              <div><p className="text-[10px] uppercase text-gray-500">Engagement</p><p className="font-medium">{reminderModal.engagementScore}/100</p></div>
            </div>
            <div className="rounded-md bg-gray-50 p-3 text-[12px] dark:bg-white/5">
              <p className="font-semibold mb-1">Suggested message</p>
              <p className="text-gray-700 dark:text-gray-300">Hi {reminderModal.name} team — your subscription period is approaching renewal. Please reach out to confirm renewal terms or contact us if you have questions.</p>
            </div>
            <div className="mt-4 flex justify-end gap-2">
              <button onClick={()=>setReminderModal(null)} className="btn-ghost">Close</button>
              <button onClick={()=>{sendReminder(reminderModal,"renewal"); setReminderModal(null);}} className="btn-primary"><Icon.send className="h-4 w-4"/>Send reminder</button>
            </div>
          </div>
        )}
      </Modal>
    </div>
  );
}

function TargetedMessageForm({ audience, count, onSave, onCancel }) {
  const audienceLabel = audience === "ALL_HUBS" ? "All hubs" : audience === "PAID_HUBS" ? "Paid hubs only" : audience === "PRIORITY" ? "Priority hubs (strategic + paid premium)" : audience.startsWith("REGION:") ? `Region: ${audience.slice(7)}` : audience.startsWith("TIER:") ? `Tier: ${audience.slice(5)}` : audience;
  const [f, setF] = useState({ name:"", subject:"", body:"", status:"DRAFT", audience });
  const submit = (e) => { e.preventDefault(); onSave(f); };
  return (
    <form onSubmit={submit} className="p-5 space-y-4">
      <div className="rounded-md border border-brand-200 bg-brand-50 p-3 dark:border-brand-700 dark:bg-brand-500/10">
        <p className="text-[10px] font-bold uppercase tracking-widest text-brand-700 dark:text-brand-300">Audience</p>
        <p className="mt-1 text-[14px] font-bold">{audienceLabel}</p>
        <p className="text-[11px] text-brand-700 dark:text-brand-300">{count} recipient{count===1?"":"s"}</p>
      </div>
      <div><label className="label">Campaign name *</label><input className="input" required value={f.name} onChange={e=>setF({...f,name:e.target.value})} placeholder="e.g. Q1 newsletter"/></div>
      <div><label className="label">Subject</label><input className="input" value={f.subject} onChange={e=>setF({...f,subject:e.target.value})} placeholder="Subject line"/></div>
      <div><label className="label">Body *</label><textarea className="input min-h-[140px]" required value={f.body} onChange={e=>setF({...f,body:e.target.value})} placeholder="Hi {{hub_name}}, …"/></div>
      <div><label className="label">Status</label>
        <select className="input" value={f.status} onChange={e=>setF({...f,status:e.target.value})}>
          <option value="DRAFT">Save as draft</option><option value="SCHEDULED">Schedule</option><option value="SENT">Send now (simulated)</option>
        </select>
      </div>
      <div className="flex justify-end gap-2 border-t border-gray-100 pt-4 dark:border-white/5">
        <button type="button" onClick={onCancel} className="btn-ghost">Cancel</button>
        <button type="submit" className="btn-primary"><Icon.send className="h-4 w-4"/> Save campaign</button>
      </div>
    </form>
  );
}
